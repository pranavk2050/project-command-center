<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pranav Kulkarni — Project Command Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; background: #F1F5F9; color: #0F172A; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 9px; }
  .header { background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 60%, #1E40AF 100%); padding: 22px 28px 0; color: #fff; }
  .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding-bottom: 16px; }
  .profile { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 46px; height: 46px; border-radius: 12px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 17px; letter-spacing: 1px; border: 2px solid rgba(255,255,255,0.25); }
  .profile-name { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
  .profile-role { font-size: 12px; opacity: 0.7; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
  .header-right { font-size: 12px; opacity: 0.7; text-align: right; }
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 0; }
  .nav-tab { padding: 8px 18px; border-radius: 8px 8px 0 0; border: none; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; letter-spacing: 0.3px; text-transform: uppercase; transition: all .15s; font-family: inherit; }
  .nav-tab.active { background: #F1F5F9; color: #1E3A5F; }
  .nav-tab:not(.active) { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
  .nav-tab:hover:not(.active) { background: rgba(255,255,255,0.18); }
  .color-dot { display: inline-block; width: 8px; height: 8px; border-radius: 4px; margin-right: 6px; }
  .container { padding: 20px 24px 50px; max-width: 1020px; margin: 0 auto; }
  .stats-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 16px 18px; border: 1px solid #E2E8F0; flex: 1 1 130px; min-width: 130px; }
  .stat-label { font-size: 12px; color: #64748B; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.3px; }
  .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; padding: 20px 22px; }
  .card-hover { cursor: pointer; transition: box-shadow .15s, transform .15s; }
  .card-hover:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .badge { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; letter-spacing: 0.2px; display: inline-block; }
  .btn { padding: 9px 20px; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.2px; font-family: inherit; transition: opacity .15s; }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: #1E3A5F; color: #fff; }
  .btn-secondary { background: #F3F4F6; color: #374151; }
  .btn-danger { background: #FEE2E2; color: #991B1B; }
  .btn-sm { font-size: 11px; padding: 4px 10px; font-weight: 700; }
  .btn-edit { background: #EFF6FF; color: #1E40AF; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 700; font-family: inherit; }
  .btn-del { background: #FEF2F2; color: #DC2626; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 700; font-family: inherit; }
  .sub-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .sub-tab { padding: 8px 18px; border-radius: 8px; border: 1px solid #E2E8F0; font-weight: 700; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.3px; font-family: inherit; transition: all .15s; }
  .sub-tab.active { background: #1E3A5F; color: #fff; border-color: #1E3A5F; }
  .sub-tab:not(.active) { background: #fff; color: #475569; }
  .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; align-items: center; }
  .task-card { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 14px 18px; margin-bottom: 10px; }
  .task-card.overdue { border-color: #FECACA; }
  .log-entry { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 13px 18px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
  .log-date { background: #EDE9FE; border-radius: 8px; padding: 5px 11px; font-size: 11px; font-weight: 800; color: #5B21B6; white-space: nowrap; }
  .milestone-card { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 16px 20px; margin-bottom: 12px; }
  .progress-bar { background: #E2E8F0; border-radius: 999px; height: 9px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width .4s; }
  .overdue-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 18px; margin-top: 20px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; backdrop-filter: blur(2px); }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow: auto; padding: 28px 28px 22px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 17px; font-weight: 800; color: #0F172A; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #94A3B8; line-height: 1; }
  .field { margin-bottom: 13px; }
  .field-label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 4px; letter-spacing: 0.3px; text-transform: uppercase; }
  .field-input { width: 100%; padding: 9px 13px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
  .field-input:focus { border-color: #1E40AF; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
  select.field-input { background: #fff; }
  textarea.field-input { min-height: 55px; resize: vertical; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .color-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .color-btn { width: 28px; height: 28px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
  .color-btn.active { border: 3px solid #0F172A; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }
  .empty { text-align: center; color: #94A3B8; padding: 50px 30px; }
  .ring-container { position: relative; flex-shrink: 0; }
  .ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; }
  .footer { text-align: center; padding: 14px 20px; font-size: 11px; color: #94A3B8; border-top: 1px solid #E2E8F0; }
  .sync-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; font-size: 12px; font-weight: 600; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
  .sync-dot.ok { background: #22C55E; }
  .sync-dot.saving { background: #F59E0B; animation: pulse 1s infinite; }
  .sync-dot.error { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .setup-card { background: #fff; border-radius: 20px; padding: 40px 36px; max-width: 480px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.1); text-align: center; }
  .print-btn { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .mindmap-wrap { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; overflow: hidden; position: relative; }
  .mindmap-svg { width: 100%; display: block; }
  .mindmap-svg text { font-family: 'Inter', system-ui, sans-serif; }
  .mm-node { cursor: default; }
  .mm-node:hover .mm-bg { filter: brightness(0.95); }
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    .header { background: #1E3A5F !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .badge,.stat-card,.progress-fill,.log-date,.mindmap-svg rect,.mindmap-svg circle,.mindmap-svg path { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  @media (max-width: 600px) {
    .header { padding: 16px 16px 0; }
    .container { padding: 14px 14px 40px; }
    .profile-name { font-size: 16px; }
    .grid-2 { grid-template-columns: 1fr; }
    .projects-grid { grid-template-columns: 1fr; }
    .header-right { display: none; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const PROFILE = { name: "Pranav Dnyaneshwar Kulkarni", role: "Assistant Manager", initials: "PK" };
const REPO = "pranavk2050/project-command-center";
const DATA_FILE = "data.json";

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate = d => { if (!d) return "\u2014"; const p = d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; };
const daysBetween = (a, b) => Math.ceil((new Date(a) - new Date(b)) / 86400000);
const truncate = (s, n) => s && s.length > n ? s.slice(0, n) + "…" : s;

const PRIORITY = { High:{bg:"#FEE2E2",tx:"#991B1B"}, Medium:{bg:"#FEF9C3",tx:"#854D0E"}, Low:{bg:"#DBEAFE",tx:"#1E40AF"} };
const STATUS = { "Not Started":{bg:"#F3F4F6",tx:"#374151"}, "In Progress":{bg:"#DBEAFE",tx:"#1E40AF"}, "On Hold":{bg:"#FEF9C3",tx:"#854D0E"}, Completed:{bg:"#D1FAE5",tx:"#065F46"}, Overdue:{bg:"#FEE2E2",tx:"#991B1B"} };
const PROJECT_COLORS = ["#2563EB","#7C3AED","#059669","#DC2626","#D97706","#0891B2","#BE185D","#4F46E5","#15803D","#B91C1C"];
const STATUS_COLORS_MAP = { "Not Started":"#94A3B8", "In Progress":"#2563EB", "On Hold":"#D97706", "Completed":"#059669" };

/* ═══ GITHUB SYNC ═══ */
const gh = {
  token: () => localStorage.getItem("gh_token") || "",
  headers: () => ({ "Authorization":"token "+(localStorage.getItem("gh_token")||""), "Content-Type":"application/json", "Accept":"application/vnd.github+json" }),
  async load() {
    const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+DATA_FILE, { headers: this.headers() });
    if (r.status === 404) return { data: null, sha: null };
    if (!r.ok) throw new Error("Read failed: "+r.status);
    const j = await r.json();
    return { data: JSON.parse(atob(j.content.replace(/\n/g,""))), sha: j.sha };
  },
  async save(data, sha) {
    const body = { message:"Sync: "+new Date().toLocaleString("en-IN"), content: btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))) };
    if (sha) body.sha = sha;
    const r = await fetch("https://api.github.com/repos/"+REPO+"/contents/"+DATA_FILE, { method:"PUT", headers:this.headers(), body:JSON.stringify(body) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message||"Save failed"); }
    return (await r.json()).content.sha;
  },
  async testToken(token) {
    try { const r = await fetch("https://api.github.com/repos/"+REPO, { headers:{"Authorization":"token "+token,"Accept":"application/vnd.github+json"} }); return r.ok; } catch { return false; }
  }
};

/* ═══ SMALL COMPONENTS ═══ */
const Badge = ({label,colors}) => <span className="badge" style={{background:colors.bg,color:colors.tx}}>{label}</span>;
function Ring({pct,size=54,stroke=5,color}) { const r=(size-stroke)/2,c=2*Math.PI*r; return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} strokeLinecap="round"/></svg>; }
function Modal({title,onClose,children}) { return <div className="modal-overlay" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}><div className="modal-header"><h2 className="modal-title">{title}</h2><button className="modal-close" onClick={onClose}>&times;</button></div>{children}</div></div>; }

/* ═══ MINDMAP COMPONENTS ═══ */
function bezierPath(x1,y1,x2,y2) {
  const mx = (x1+x2)/2;
  return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
}

function ProjectMindMap({ project, tasks, logs, milestones }) {
  const [hovered, setHovered] = useState(null);
  const W = 960, H = 580;
  const cx = W/2, cy = H/2;

  const completed = tasks.filter(t=>t.status==="Completed");
  const inProgress = tasks.filter(t=>t.status==="In Progress");
  const notStarted = tasks.filter(t=>t.status==="Not Started");
  const onHold = tasks.filter(t=>t.status==="On Hold");
  const overdue = tasks.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr());
  const pct = tasks.length ? Math.round(completed.length/tasks.length*100) : 0;

  const branches = [
    { label:"✅ Completed ("+completed.length+")", color:"#059669", angle:-40, items: completed.slice(0,6).map(t=>({label:truncate(t.title,28),sub:fmtDate(t.deadline)})) },
    { label:"🔄 In Progress ("+inProgress.length+")", color:"#2563EB", angle:-140, items: inProgress.slice(0,6).map(t=>({label:truncate(t.title,28),sub:t.assignedBy?"By: "+t.assignedBy:""})) },
    { label:"⏳ Not Started ("+notStarted.length+")", color:"#94A3B8", angle:155, items: notStarted.slice(0,5).map(t=>({label:truncate(t.title,28),sub:fmtDate(t.deadline)})) },
    { label:"🎯 Milestones ("+milestones.length+")", color:"#7C3AED", angle:35, items: milestones.slice(0,5).map(m=>({label:truncate(m.title,28),sub:m.progress+"%"})) },
  ];
  if (onHold.length) branches.push({ label:"⏸ On Hold ("+onHold.length+")", color:"#D97706", angle:90, items: onHold.slice(0,4).map(t=>({label:truncate(t.title,28)})) });
  if (overdue.length) branches.push({ label:"⚠️ Overdue ("+overdue.length+")", color:"#DC2626", angle:-90, items: overdue.slice(0,4).map(t=>({label:truncate(t.title,28),sub:daysBetween(todayStr(),t.deadline)+"d late"})) });

  const branchLen = 180;
  const childSpacing = 34;
  const childOffset = 130;

  return (
    <div className="mindmap-wrap">
      <svg className="mindmap-svg" viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" floodOpacity="0.1"/></filter>
        </defs>

        {/* Background pattern */}
        <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="0.8" fill="#E2E8F0"/></pattern>
        <rect width={W} height={H} fill="#FAFBFC"/><rect width={W} height={H} fill="url(#dots)"/>

        {/* Branches */}
        {branches.map((b,bi) => {
          const rad = b.angle * Math.PI / 180;
          const bx = cx + Math.cos(rad) * branchLen;
          const by = cy + Math.sin(rad) * branchLen;
          const side = bx > cx ? 1 : -1;
          const totalH = b.items.length * childSpacing;
          const startY = by - totalH/2 + childSpacing/2;

          return <g key={bi}>
            {/* Branch line */}
            <path d={bezierPath(cx,cy,bx,by)} fill="none" stroke={b.color} strokeWidth="2.5" opacity="0.5"/>

            {/* Branch label node */}
            <g className="mm-node" filter="url(#shadow)">
              <rect className="mm-bg" x={bx-75} y={by-16} width={150} height={32} rx={10} fill={b.color} opacity="0.12"/>
              <rect x={bx-75} y={by-16} width={150} height={32} rx={10} fill="none" stroke={b.color} strokeWidth="1.5" opacity="0.4"/>
              <text x={bx} y={by+4} textAnchor="middle" fontSize="11" fontWeight="700" fill={b.color}>{b.label}</text>
            </g>

            {/* Child items */}
            {b.items.map((item,ci) => {
              const iy = startY + ci * childSpacing;
              const ix = bx + side * childOffset;
              return <g key={ci} className="mm-node" onMouseEnter={()=>setHovered(bi+"-"+ci)} onMouseLeave={()=>setHovered(null)}>
                <path d={bezierPath(bx,by,ix,iy)} fill="none" stroke={b.color} strokeWidth="1.2" opacity="0.3"/>
                <circle cx={ix - side*55} cy={iy} r={4} fill={b.color} opacity="0.6"/>
                <text x={ix - side*48} y={iy+1} textAnchor={side>0?"start":"end"} fontSize="10.5" fontWeight="600" fill="#334155">{item.label}</text>
                {item.sub && <text x={ix - side*48} y={iy+13} textAnchor={side>0?"start":"end"} fontSize="9" fill="#94A3B8">{item.sub}</text>}
              </g>;
            })}
          </g>;
        })}

        {/* Center node */}
        <g filter="url(#glow)">
          <circle cx={cx} cy={cy} r={52} fill={project.color} opacity="0.1"/>
          <circle cx={cx} cy={cy} r={44} fill="#fff" stroke={project.color} strokeWidth="3"/>
          <text x={cx} y={cy-10} textAnchor="middle" fontSize="11" fontWeight="800" fill={project.color}>{truncate(project.name,16)}</text>
          <text x={cx} y={cy+6} textAnchor="middle" fontSize="22" fontWeight="800" fill={project.color}>{pct}%</text>
          <text x={cx} y={cy+20} textAnchor="middle" fontSize="9" fill="#94A3B8">{tasks.length} tasks</text>
        </g>

        {/* Legend */}
        <text x={16} y={H-12} fontSize="10" fill="#94A3B8" fontWeight="500">📝 {logs.length} activity log entries • {fmtDate(project.startDate)} → {fmtDate(project.targetEnd)}</text>
      </svg>
    </div>
  );
}

function OverviewMindMap({ projects, tasks, milestones }) {
  const W = 960, H = 520;
  const cx = W/2, cy = H/2;

  if (!projects.length) return <div className="card empty"><div style={{fontSize:36,marginBottom:12}}>🗺️</div><div style={{fontWeight:700,fontSize:15}}>No projects to map</div><div style={{color:"#64748B",fontSize:13,marginTop:6}}>Create a project first to see the journey map.</div></div>;

  const angleStep = 360 / projects.length;
  const branchLen = Math.min(200, 140 + projects.length * 5);

  return (
    <div className="mindmap-wrap">
      <svg className="mindmap-svg" viewBox={`0 0 ${W} ${H}`} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow2"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="shadow2"><feDropShadow dx="0" dy="2" stdDeviation="3" floodOpacity="0.08"/></filter>
        </defs>
        <pattern id="dots2" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="0.8" fill="#E2E8F0"/></pattern>
        <rect width={W} height={H} fill="#FAFBFC"/><rect width={W} height={H} fill="url(#dots2)"/>

        {projects.map((p,i) => {
          const angle = -90 + i * angleStep;
          const rad = angle * Math.PI / 180;
          const px = cx + Math.cos(rad) * branchLen;
          const py = cy + Math.sin(rad) * branchLen;
          const pT = tasks.filter(t=>t.projectId===p.id);
          const done = pT.filter(t=>t.status==="Completed").length;
          const ov = pT.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr()).length;
          const pct = pT.length ? Math.round(done/pT.length*100) : 0;
          const pM = milestones.filter(m=>m.projectId===p.id);
          const side = px > cx ? 1 : -1;

          // Child stats
          const stats = [
            { label: "📋 "+pT.length+" tasks", color: "#475569" },
            { label: "✅ "+done+" done", color: "#059669" },
            ov > 0 ? { label: "⚠️ "+ov+" overdue", color: "#DC2626" } : null,
            { label: "🎯 "+pM.length+" milestones", color: "#7C3AED" },
          ].filter(Boolean);

          return <g key={p.id}>
            <path d={bezierPath(cx,cy,px,py)} fill="none" stroke={p.color} strokeWidth="2.5" opacity="0.4"/>

            {/* Project node */}
            <g filter="url(#shadow2)" className="mm-node">
              <circle cx={px} cy={py} r={38} fill={p.color} opacity="0.08"/>
              <circle cx={px} cy={py} r={32} fill="#fff" stroke={p.color} strokeWidth="2.5"/>
              <text x={px} y={py-6} textAnchor="middle" fontSize="10" fontWeight="800" fill={p.color}>{truncate(p.name,14)}</text>
              <text x={px} y={py+10} textAnchor="middle" fontSize="16" fontWeight="800" fill={p.color}>{pct}%</text>
            </g>

            {/* Stats */}
            {stats.map((s,si) => {
              const sx = px + side * 75;
              const sy = py - ((stats.length-1)*16)/2 + si * 16;
              return <g key={si}>
                <path d={`M${px + side*32},${py} L${sx-side*5},${sy}`} fill="none" stroke={p.color} strokeWidth="0.8" opacity="0.25"/>
                <text x={sx} y={sy+4} textAnchor={side>0?"start":"end"} fontSize="9.5" fontWeight="600" fill={s.color}>{s.label}</text>
              </g>;
            })}
          </g>;
        })}

        {/* Center */}
        <g filter="url(#glow2)">
          <circle cx={cx} cy={cy} r={48} fill="#1E3A5F" opacity="0.08"/>
          <circle cx={cx} cy={cy} r={40} fill="#fff" stroke="#1E3A5F" strokeWidth="3"/>
          <text x={cx} y={cy-10} textAnchor="middle" fontSize="16" fontWeight="800" fill="#1E3A5F">{PROFILE.initials}</text>
          <text x={cx} y={cy+6} textAnchor="middle" fontSize="9" fontWeight="700" fill="#64748B">{PROFILE.role.toUpperCase()}</text>
          <text x={cx} y={cy+18} textAnchor="middle" fontSize="9" fill="#94A3B8">{projects.length} projects</text>
        </g>
      </svg>
    </div>
  );
}

lue={f.remarks} onChange={e=>set("remarks",e.target.value)}/></div><div className="btn-row"><button className="btn btn-secondary" onClick={onCancel}>Cancel</button><button className="btn btn-primary" onClick={()=>f.title.trim()&&f.projectId&&onSave({...f,id:f.id||uid(),createdAt:f.createdAt||todayStr(),updatedAt:todayStr()})}>{task?"Update":"Add Task"}</button></div></>;

/* ═══ SETUP ═══ */
function SetupScreen({onDone}) {
  const [token,setToken]=useState(""); const [testing,setTesting]=useState(false); const [error,setError]=useState("");
  const go = async()=>{ if(!token.trim())return; setTesting(true);setError(""); const ok=await gh.testToken(token.trim()); if(ok){localStorage.setItem("gh_token",token.trim());onDone();}else{setError("Token can't access the repo. Ensure 'repo' scope.");} setTesting(false); };
  return <div className="setup-screen"><div className="setup-card"><div style={{fontSize:48,marginBottom:16}}>🔐</div><h1 style={{fontSize:22,fontWeight:800,marginBottom:8}}>Connect to GitHub</h1><p style={{color:"#64748B",fontSize:14,marginBottom:24,lineHeight:1.5}}>Your data syncs to <b>{REPO}</b>. Enter your GitHub token. It stays in this browser only.</p><div className="field"><input className="field-input" value={token} onChange={e=>setToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx" style={{textAlign:"center",fontSize:15}}/></div>{error&&<div style={{color:"#DC2626",fontSize:13,marginBottom:12}}>{error}</div>}<button className="btn btn-primary" onClick={go} disabled={testing} style={{width:"100%",padding:14,fontSize:15}}>{testing?"Verifying...":"Connect & Start"}</button><p style={{color:"#94A3B8",fontSize:11,marginTop:16}}>GitHub → Settings → Developer Settings → Personal Access Tokens → Classic → repo scope</p></div></div>;
}

/* ═══ MAIN APP ═══ */
function App() {
  const [authed,setAuthed]=useState(!!localStorage.getItem("gh_token"));
  const [projects,setProjects]=useState([]); const [tasks,setTasks]=useState([]); const [logs,setLogs]=useState([]); const [milestones,setMilestones]=useState([]);
  const [loading,setLoading]=useState(true); const [syncStatus,setSyncStatus]=useState("loading"); const [lastSync,setLastSync]=useState(null);
  const shaRef=useRef(null);
  const [view,setView]=useState("overview"); const [modal,setModal]=useState(null); const [editItem,setEditItem]=useState(null); const [subTab,setSubTab]=useState("tasks"); const [filterStatus,setFilterStatus]=useState("All");

  const loadFromGH=useCallback(async()=>{ setSyncStatus("loading"); try{ const{data,sha}=await gh.load(); shaRef.current=sha; if(data){setProjects(data.projects||[]);setTasks(data.tasks||[]);setLogs(data.logs||[]);setMilestones(data.milestones||[]);} setSyncStatus("ok");setLastSync(new Date()); }catch(e){console.error(e);setSyncStatus("error");} setLoading(false); },[]);
  useEffect(()=>{if(authed)loadFromGH();},[authed,loadFromGH]);

  const saveToGH=useCallback(async(p,t,l,m)=>{ setSyncStatus("saving"); try{ const data={projects:p,tasks:t,logs:l,milestones:m,lastUpdated:new Date().toISOString()}; const ns=await gh.save(data,shaRef.current); shaRef.current=ns; setSyncStatus("ok");setLastSync(new Date()); }catch(e){console.error(e);if(e.message&&e.message.includes("does not match"))await loadFromGH();setSyncStatus("error");} },[loadFromGH]);

  const update=(setFn,key,nv,extra)=>{setFn(nv);const s={projects,tasks,logs,milestones,...extra,[key]:nv};saveToGH(s.projects,s.tasks,s.logs,s.milestones);};
  const addProject=p=>{const n=[...projects,p];update(setProjects,"projects",n,{});setModal(null);};
  const updateProject=p=>{const n=projects.map(x=>x.id===p.id?p:x);update(setProjects,"projects",n,{});setModal(null);setEditItem(null);};
  const deleteProject=id=>{if(!confirm("Delete project and all data?"))return;const np=projects.filter(x=>x.id!==id),nt=tasks.filter(x=>x.projectId!==id),nl=logs.filter(x=>x.projectId!==id),nm=milestones.filter(x=>x.projectId!==id);setProjects(np);setTasks(nt);setLogs(nl);setMilestones(nm);saveToGH(np,nt,nl,nm);setView("overview");};
  const addTask=t=>{const n=[...tasks,t];update(setTasks,"tasks",n,{});setModal(null);};
  const updateTask=t=>{const n=tasks.map(x=>x.id===t.id?t:x);update(setTasks,"tasks",n,{});setModal(null);setEditItem(null);};
  const deleteTask=id=>{const n=tasks.filter(x=>x.id!==id);update(setTasks,"tasks",n,{});};
  const addLog=l=>{const n=[l,...logs];update(setLogs,"logs",n,{});setModal(null);};
  const deleteLog=id=>{const n=logs.filter(x=>x.id!==id);update(setLogs,"logs",n,{});};
  const addMilestone=m=>{const n=[...milestones,m];update(setMilestones,"milestones",n,{});setModal(null);};
  const deleteMilestone=id=>{const n=milestones.filter(x=>x.id!==id);update(setMilestones,"milestones",n,{});};

  const activeProjectId=view.startsWith("project:")?view.split(":")[1]:null;
  const activeProject=projects.find(p=>p.id===activeProjectId);
  const projTasks=pid=>tasks.filter(t=>t.projectId===pid);
  const projLogs=pid=>logs.filter(l=>l.projectId===pid);
  const projMilestones=pid=>milestones.filter(m=>m.projectId===pid);
  const projProgress=pid=>{const t=projTasks(pid);if(!t.length)return 0;return Math.round((t.filter(x=>x.status==="Completed").length/t.length)*100);};
  const totalCompleted=tasks.filter(t=>t.status==="Completed").length;
  const totalOverdue=tasks.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr()).length;
  const totalInProgress=tasks.filter(t=>t.status==="In Progress").length;
  const filteredTasks=useMemo(()=>{let list=activeProjectId?projTasks(activeProjectId):tasks;if(filterStatus!=="All")list=list.filter(t=>{if(filterStatus==="Overdue")return t.status!=="Completed"&&t.deadline&&t.deadline<todayStr();return t.status===filterStatus;});return list.sort((a,b)=>({High:0,Medium:1,Low:2}[a.priority]??1)-({High:0,Medium:1,Low:2}[b.priority]??1));},[tasks,activeProjectId,filterStatus]);

  if(!authed)return<SetupScreen onDone={()=>setAuthed(true)}/>;
  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#64748B"}}>Loading from GitHub...</div>;

  const syncLabel={loading:"Syncing...",ok:"Synced to GitHub",saving:"Saving...",error:"Sync error"}[syncStatus];
  const syncClass={loading:"saving",ok:"ok",saving:"saving",error:"error"}[syncStatus];

  return (
    <div>
      <div className="sync-bar no-print" style={{background:syncStatus==="error"?"#FEF2F2":"#F0FDF4",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span className={"sync-dot "+syncClass}/><span style={{color:syncStatus==="error"?"#DC2626":"#16A34A"}}>{syncLabel}</span>{lastSync&&<span style={{color:"#94A3B8",fontSize:11}}>• {lastSync.toLocaleTimeString("en-IN")}</span>}</div><div style={{display:"flex",gap:8}}><button onClick={loadFromGH} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#2563EB",fontWeight:600,fontFamily:"inherit"}}>↻ Refresh</button><button onClick={()=>{localStorage.removeItem("gh_token");setAuthed(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#94A3B8",fontFamily:"inherit"}}>Disconnect</button></div></div>

      <div className="header"><div className="header-top"><div className="profile"><div className="avatar">{PROFILE.initials}</div><div><div className="profile-name">{PROFILE.name}</div><div className="profile-role">{PROFILE.role} &bull; Project Command Center</div></div></div><div className="header-right"><div style={{fontWeight:600}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div><div>{projects.length} Project{projects.length!==1?"s":""} &bull; {tasks.length} Task{tasks.length!==1?"s":""}</div><button className="print-btn no-print" onClick={()=>window.print()} style={{marginTop:6}}>🖨 Print</button></div></div>
        <div className="nav-tabs no-print">
          <button className={"nav-tab "+(view==="overview"?"active":"")} onClick={()=>{setView("overview");setFilterStatus("All");}}>📊 Overview</button>
          <button className={"nav-tab "+(view==="journeymap"?"active":"")} onClick={()=>setView("journeymap")}>🗺️ Journey Map</button>
          {projects.map(p=>(<button key={p.id} className={"nav-tab "+(activeProjectId===p.id?"active":"")} onClick={()=>{setView("project:"+p.id);setSubTab("tasks");setFilterStatus("All");}} style={activeProjectId!==p.id?{borderBottom:"3px solid "+p.color}:{}}><span className="color-dot" style={{background:p.color}}/>{p.name}</button>))}
        </div>
      </div>

      <div className="container">
        {/* OVERVIEW */}
        {view==="overview"&&<>
          <div className="stats-row"><div className="stat-card"><div className="stat-label">📁 PROJECTS</div><div className="stat-value" style={{color:"#1E3A5F"}}>{projects.length}</div></div><div className="stat-card"><div className="stat-label">📋 TASKS</div><div className="stat-value" style={{color:"#1E40AF"}}>{tasks.length}</div></div><div className="stat-card"><div className="stat-label">🔄 IN PROGRESS</div><div className="stat-value" style={{color:"#2563EB"}}>{totalInProgress}</div></div><div className="stat-card"><div className="stat-label">✅ COMPLETED</div><div className="stat-value" style={{color:"#059669"}}>{totalCompleted}</div></div><div className="stat-card"><div className="stat-label">⚠️ OVERDUE</div><div className="stat-value" style={{color:"#DC2626"}}>{totalOverdue}</div></div></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:16,fontWeight:800}}>My Projects</h2><button className="btn btn-primary no-print" onClick={()=>setModal("project")}>+ New Project</button></div>
          {projects.length===0?<div className="card empty"><div style={{fontSize:36,marginBottom:12}}>📁</div><div style={{fontWeight:700,fontSize:15,color:"#0F172A",marginBottom:6}}>No projects yet</div><div style={{color:"#64748B",fontSize:13,marginBottom:18}}>Create your first project to start tracking.</div><button className="btn btn-primary" onClick={()=>setModal("project")}>+ Create First Project</button></div>:
          <div className="projects-grid">{projects.map(p=>{const pT=projTasks(p.id),done=pT.filter(t=>t.status==="Completed").length,ov=pT.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr()).length,pct=projProgress(p.id);return<div key={p.id} className="card card-hover" onClick={()=>{setView("project:"+p.id);setSubTab("tasks");setFilterStatus("All");}} style={{borderLeft:"4px solid "+p.color}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}><div style={{fontWeight:800,fontSize:15,marginBottom:3}}>{p.name}</div>{p.description&&<div style={{fontSize:12,color:"#64748B",marginBottom:8,lineHeight:1.4}}>{p.description}</div>}{p.owner&&<div style={{fontSize:11,color:"#94A3B8"}}>Stakeholder: {p.owner}</div>}</div><div className="ring-container"><Ring pct={pct} color={p.color}/><div className="ring-text" style={{fontSize:12,color:p.color}}>{pct}%</div></div></div><div style={{display:"flex",gap:14,fontSize:12,color:"#64748B",marginTop:10,borderTop:"1px solid #F1F5F9",paddingTop:10,flexWrap:"wrap"}}><span>📋 {pT.length}</span><span>✅ {done}</span>{ov>0&&<span style={{color:"#DC2626",fontWeight:700}}>⚠ {ov}</span>}<span>📝 {projLogs(p.id).length}</span><span>🎯 {projMilestones(p.id).length}</span></div><div style={{fontSize:11,color:"#94A3B8",marginTop:6}}>{fmtDate(p.startDate)} → {fmtDate(p.targetEnd)}</div></div>;})}</div>}
          {totalOverdue>0&&<div className="overdue-box"><div style={{fontWeight:800,color:"#991B1B",fontSize:13,marginBottom:10,textTransform:"uppercase"}}>⚠ Overdue Tasks</div>{tasks.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr()).map(t=>{const proj=projects.find(p=>p.id===t.projectId);return<div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #FECACA",fontSize:13}}><div><b>{t.title}</b> <span style={{color:"#64748B",fontSize:11}}>({proj?.name||"—"})</span></div><span style={{color:"#DC2626",fontWeight:600,fontSize:12}}>{daysBetween(todayStr(),t.deadline)}d overdue</span></div>;})}</div>}
        </>}

        {/* JOURNEY MAP */}
        {view==="journeymap"&&<>
          <h2 style={{fontSize:16,fontWeight:800,marginBottom:16}}>🗺️ All Projects Journey Map</h2>
          <OverviewMindMap projects={projects} tasks={tasks} milestones={milestones}/>
        </>}

        {/* PROJECT DETAIL */}
        {activeProject&&<>
          <div className="card" style={{marginBottom:18,borderLeft:"5px solid "+activeProject.color}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
              <div><div style={{display:"flex",alignItems:"center",gap:10}}><button onClick={()=>setView("overview")} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#64748B",padding:0}}>←</button><h2 style={{fontSize:18,fontWeight:800}}>{activeProject.name}</h2></div>{activeProject.description&&<div style={{fontSize:13,color:"#64748B",marginTop:4,marginLeft:28}}>{activeProject.description}</div>}<div style={{fontSize:12,color:"#94A3B8",marginTop:4,marginLeft:28}}>{activeProject.owner&&<>Stakeholder: <b>{activeProject.owner}</b> &bull; </>}{fmtDate(activeProject.startDate)} → {fmtDate(activeProject.targetEnd)}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:14}} className="no-print"><div className="ring-container"><Ring pct={projProgress(activeProjectId)} size={64} stroke={6} color={activeProject.color}/><div className="ring-text" style={{fontSize:14,color:activeProject.color}}>{projProgress(activeProjectId)}%</div></div><div style={{display:"flex",flexDirection:"column",gap:4}}><button className="btn btn-secondary btn-sm" onClick={()=>{setEditItem(activeProject);setModal("project");}}>Edit</button><button className="btn btn-danger btn-sm" onClick={()=>deleteProject(activeProjectId)}>Delete</button></div></div>
            </div>
            <div style={{display:"flex",gap:16,marginTop:14,paddingTop:14,borderTop:"1px solid #F1F5F9",fontSize:13,color:"#475569",flexWrap:"wrap"}}><span>📋 <b>{projTasks(activeProjectId).length}</b> Tasks</span><span>✅ <b>{projTasks(activeProjectId).filter(t=>t.status==="Completed").length}</b> Done</span><span>🔄 <b>{projTasks(activeProjectId).filter(t=>t.status==="In Progress").length}</b> In Progress</span><span>📝 <b>{projLogs(activeProjectId).length}</b> Logs</span><span>🎯 <b>{projMilestones(activeProjectId).length}</b> Milestones</span></div>
          </div>

          <div className="sub-tabs no-print">
            {["tasks","daily log","milestones","mindmap"].map(t=>(<button key={t} className={"sub-tab "+(subTab===t?"active":"")} onClick={()=>{setSubTab(t);setFilterStatus("All");}}>{t==="tasks"?"📋 ":t==="daily log"?"📝 ":t==="milestones"?"🎯 ":"🗺️ "}{t}</button>))}
          </div>

          {subTab==="mindmap"&&<ProjectMindMap project={activeProject} tasks={projTasks(activeProjectId)} logs={projLogs(activeProjectId)} milestones={projMilestones(activeProjectId)}/>}

          {subTab==="tasks"&&<>{/* tasks UI */}
            <div className="filter-bar no-print"><button className="btn btn-primary" onClick={()=>{setEditItem(null);setModal("task");}}>+ New Task</button><select className="field-input" style={{maxWidth:150}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option>All</option><option>Not Started</option><option>In Progress</option><option>On Hold</option><option>Completed</option><option>Overdue</option></select><span style={{fontSize:12,color:"#64748B",marginLeft:"auto"}}>{filteredTasks.length} task{filteredTasks.length!==1?"s":""}</span></div>
            {filteredTasks.length===0?<div className="card empty" style={{padding:36}}>No tasks match.</div>:filteredTasks.map(t=>{const isOv=t.status!=="Completed"&&t.deadline&&t.deadline<todayStr();return<div key={t.id} className={"task-card "+(isOv?"overdue":"")}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}><div style={{flex:1,minWidth:180}}><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{t.title}</div>{t.description&&<div style={{fontSize:12,color:"#64748B",marginBottom:6,lineHeight:1.4}}>{t.description}</div>}<div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}><Badge label={t.priority} colors={PRIORITY[t.priority]}/><Badge label={isOv?"Overdue":t.status} colors={STATUS[isOv?"Overdue":t.status]}/><span style={{fontSize:11,color:"#94A3B8"}}>via {t.source}</span></div></div><div style={{textAlign:"right",fontSize:12,color:"#64748B"}}>{t.deadline&&<div>Due: <b style={{color:isOv?"#DC2626":"#0F172A"}}>{fmtDate(t.deadline)}</b></div>}{t.assignedBy&&<div>By: {t.assignedBy}</div>}<div style={{display:"flex",gap:6,marginTop:8,justifyContent:"flex-end"}} className="no-print"><button className="btn-edit" onClick={()=>{setEditItem(t);setModal("task");}}>Edit</button><button className="btn-del" onClick={()=>deleteTask(t.id)}>Delete</button></div></div></div>{t.remarks&&<div style={{marginTop:8,padding:"7px 12px",background:"#F8FAFC",borderRadius:8,fontSize:12,color:"#64748B"}}>💬 {t.remarks}</div>}</div>;})}
          </>}

          {subTab==="daily log"&&<><div style={{marginBottom:14}} className="no-print"><button className="btn btn-primary" onClick={()=>setModal("log")}>+ Add Entry</button></div>{projLogs(activeProjectId).length===0?<div className="card empty" style={{padding:36}}>No activity logged yet.</div>:projLogs(activeProjectId).map(l=>(<div key={l.id} className="log-entry"><div className="log-date">{fmtDate(l.date)}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{l.activity}</div><div style={{display:"flex",gap:14,fontSize:12,color:"#64748B",marginTop:3}}>{l.duration&&<span>⏱ {l.duration}</span>}{l.outcome&&<span>✓ {l.outcome}</span>}</div></div><button className="btn-del no-print" onClick={()=>deleteLog(l.id)}>Delete</button></div>))}</>}

          {subTab==="milestones"&&<><div style={{marginBottom:14}} className="no-print"><button className="btn btn-primary" onClick={()=>setModal("milestone")}>+ Add Milestone</button></div>{projMilestones(activeProjectId).length===0?<div className="card empty" style={{padding:36}}>No milestones yet.</div>:projMilestones(activeProjectId).map(m=>(<div key={m.id} className="milestone-card"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div><div style={{fontWeight:700,fontSize:14}}>{m.title}</div>{m.targetDate&&<div style={{fontSize:12,color:"#64748B"}}>Target: {fmtDate(m.targetDate)}</div>}</div><div style={{display:"flex",gap:6,alignItems:"center"}}><Badge label={m.status} colors={STATUS[m.status]}/><button className="btn-del no-print" onClick={()=>deleteMilestone(m.id)}>Delete</button></div></div><div className="progress-bar"><div className="progress-fill" style={{width:m.progress+"%",background:m.progress===100?"#059669":m.progress>=50?"#2563EB":"#F59E0B"}}/></div><div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>{m.progress}% complete</div>{m.notes&&<div style={{marginTop:8,padding:"7px 12px",background:"#F8FAFC",borderRadius:8,fontSize:12,color:"#64748B"}}>{m.notes}</div>}</div>))}</>}
        </>}
      </div>

      {modal==="project"&&<Modal title={editItem?"Edit Project":"New Project"} onClose={()=>{setModal(null);setEditItem(null);}}><ProjectForm existing={editItem} onSave={editItem?updateProject:addProject} onCancel={()=>{setModal(null);setEditItem(null);}}/></Modal>}
      {modal==="task"&&<Modal title={editItem?"Edit Task":"New Task"} onClose={()=>{setModal(null);setEditItem(null);}}><TaskForm task={editItem} projects={projects} defaultProject={activeProjectId} onSave={editItem?updateTask:addTask} onCancel={()=>{setModal(null);setEditItem(null);}}/></Modal>}
      {modal==="log"&&<Modal title="New Activity Log" onClose={()=>setModal(null)}><LogForm projects={projects} defaultProject={activeProjectId} onSave={addLog} onCancel={()=>setModal(null)}/></Modal>}
      {modal==="milestone"&&<Modal title="New Milestone" onClose={()=>setModal(null)}><MilestoneForm projects={projects} defaultProject={activeProjectId} onSave={addMilestone} onCancel={()=>setModal(null)}/></Modal>}

      <div className="footer">{PROFILE.name} &bull; {PROFILE.role} &bull; Project Command Center &bull; Cloud-synced to GitHub</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
