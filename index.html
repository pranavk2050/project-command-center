<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pranav Kulkarni — Project Command Center</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; background: #F1F5F9; color: #0F172A; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 9px; }
  .header { background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 60%, #1E40AF 100%); padding: 22px 28px 0; color: #fff; }
  .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding-bottom: 16px; }
  .profile { display: flex; align-items: center; gap: 14px; }
  .avatar { width: 46px; height: 46px; border-radius: 12px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 17px; letter-spacing: 1px; border: 2px solid rgba(255,255,255,0.25); }
  .profile-name { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
  .profile-role { font-size: 12px; opacity: 0.7; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
  .header-right { font-size: 12px; opacity: 0.7; text-align: right; }
  .nav-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 0; }
  .nav-tab { padding: 8px 18px; border-radius: 8px 8px 0 0; border: none; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; letter-spacing: 0.3px; text-transform: uppercase; transition: all .15s; font-family: inherit; }
  .nav-tab.active { background: #F1F5F9; color: #1E3A5F; }
  .nav-tab:not(.active) { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
  .color-dot { display: inline-block; width: 8px; height: 8px; border-radius: 4px; margin-right: 6px; }
  .container { padding: 20px 24px 50px; max-width: 1020px; margin: 0 auto; }
  .stats-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; }
  .stat-card { background: #fff; border-radius: 12px; padding: 16px 18px; border: 1px solid #E2E8F0; flex: 1 1 130px; min-width: 130px; }
  .stat-label { font-size: 12px; color: #64748B; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.3px; }
  .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .card { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; padding: 20px 22px; }
  .card-hover { cursor: pointer; transition: box-shadow .15s, transform .15s; }
  .card-hover:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .badge { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap; letter-spacing: 0.2px; display: inline-block; }
  .btn { padding: 9px 20px; border: none; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; letter-spacing: 0.2px; font-family: inherit; transition: opacity .15s; }
  .btn:hover { opacity: 0.88; }
  .btn-primary { background: #1E3A5F; color: #fff; }
  .btn-secondary { background: #F3F4F6; color: #374151; }
  .btn-danger { background: #FEE2E2; color: #991B1B; }
  .btn-sm { font-size: 11px; padding: 4px 10px; font-weight: 700; }
  .btn-edit { background: #EFF6FF; color: #1E40AF; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 700; font-family: inherit; }
  .btn-del { background: #FEF2F2; color: #DC2626; border: none; border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-weight: 700; font-family: inherit; }
  .sub-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .sub-tab { padding: 8px 18px; border-radius: 8px; border: 1px solid #E2E8F0; font-weight: 700; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.3px; font-family: inherit; transition: all .15s; }
  .sub-tab.active { background: #1E3A5F; color: #fff; border-color: #1E3A5F; }
  .sub-tab:not(.active) { background: #fff; color: #475569; }
  .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; align-items: center; }
  .task-card { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 14px 18px; margin-bottom: 10px; }
  .task-card.overdue { border-color: #FECACA; }
  .log-entry { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 13px 18px; display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
  .log-date { background: #EDE9FE; border-radius: 8px; padding: 5px 11px; font-size: 11px; font-weight: 800; color: #5B21B6; white-space: nowrap; }
  .milestone-card { background: #fff; border-radius: 12px; border: 1px solid #E2E8F0; padding: 16px 20px; margin-bottom: 12px; }
  .progress-bar { background: #E2E8F0; border-radius: 999px; height: 9px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; transition: width .4s; }
  .overdue-box { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 18px; margin-top: 20px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; backdrop-filter: blur(2px); }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow: auto; padding: 28px 28px 22px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 17px; font-weight: 800; color: #0F172A; }
  .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: #94A3B8; line-height: 1; }
  .field { margin-bottom: 13px; }
  .field-label { display: block; font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 4px; letter-spacing: 0.3px; text-transform: uppercase; }
  .field-input { width: 100%; padding: 9px 13px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 13px; outline: none; font-family: inherit; }
  .field-input:focus { border-color: #1E40AF; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
  select.field-input { background: #fff; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .color-picker { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
  .color-btn { width: 28px; height: 28px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; }
  .color-btn.active { border: 3px solid #0F172A; }
  .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 10px; }

  .ring-container { position: relative; flex-shrink: 0; }
  .ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; }
  .footer { text-align: center; padding: 14px 20px; font-size: 11px; color: #94A3B8; border-top: 1px solid #E2E8F0; }
  .sync-bar { display: flex; align-items: center; gap: 8px; padding: 8px 16px; font-size: 12px; font-weight: 600; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
  .sync-dot.ok { background: #22C55E; }
  .sync-dot.saving { background: #F59E0B; animation: pulse 1s infinite; }
  .sync-dot.error { background: #EF4444; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
  .setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .setup-card { background: #fff; border-radius: 20px; padding: 40px 36px; max-width: 480px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.1); text-align: center; }
  .print-btn { background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 8px; padding: 6px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }

  /* MINDMAP STYLES */
  .mm-container { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; overflow: auto; position: relative; min-height: 400px; }
  .mm-canvas { position: relative; min-width: 100%; min-height: 400px; padding: 40px 20px; }
  .mm-svg { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
  .mm-node { position: absolute; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: transform 0.2s, opacity 0.2s; z-index: 2; }
  .mm-node:hover { z-index: 10; }
  .mm-pill { padding: 6px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; border: 2px solid; display: flex; align-items: center; gap: 7px; transition: box-shadow .15s, transform .15s; user-select: none; }
  .mm-pill:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: scale(1.03); }
  .mm-toggle { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0; line-height: 1; }
  .mm-count { font-size: 10px; opacity: 0.7; font-weight: 600; }
  .mm-root { padding: 12px 22px; border-radius: 14px; font-size: 15px; font-weight: 800; }
  .mm-leaf { padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; border-width: 1.5px; }
  .mm-detail { font-size: 9px; color: #94A3B8; font-weight: 500; margin-left: 4px; }
  .mm-hint { position: absolute; bottom: 12px; right: 16px; font-size: 11px; color: #94A3B8; z-index: 5; }
  .mm-legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 12px 16px; border-top: 1px solid #E2E8F0; font-size: 11px; color: #64748B; }
  .mm-legend-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 4px; vertical-align: middle; }

  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    .header { background: #1E3A5F !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .badge,.stat-card,.progress-fill,.log-date,.mm-pill,.mm-toggle { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  @media (max-width: 600px) {
    .header { padding: 16px 16px 0; }
    .container { padding: 14px 14px 40px; }
    .profile-name { font-size: 16px; }
    .grid-2 { grid-template-columns: 1fr; }
    .projects-grid { grid-template-columns: 1fr; }
    .header-right { display: none; }
  }
</style>

<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const PROFILE = { name: "Pranav Dnyaneshwar Kulkarni", role: "Assistant Manager", initials: "PK" };
const REPO = "pranavk2050/project-command-center";
const DATA_FILE = "data.json";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate = d => { if (!d) return "\u2014"; const p = d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; };
const daysBetween = (a, b) => Math.ceil((new Date(a) - new Date(b)) / 86400000);
const PRIORITY = { High:{bg:"#FEE2E2",tx:"#991B1B"}, Medium:{bg:"#FEF9C3",tx:"#854D0E"}, Low:{bg:"#DBEAFE",tx:"#1E40AF"} };
const STATUS = { "Not Started":{bg:"#F3F4F6",tx:"#374151"}, "In Progress":{bg:"#DBEAFE",tx:"#1E40AF"}, "On Hold":{bg:"#FEF9C3",tx:"#854D0E"}, Completed:{bg:"#D1FAE5",tx:"#065F46"}, Overdue:{bg:"#FEE2E2",tx:"#991B1B"} };
const PROJECT_COLORS = ["#2563EB","#7C3AED","#059669","#DC2626","#D97706","#0891B2","#BE185D","#4F46E5","#15803D","#B91C1C"];
const SC = { "Not Started":"#94A3B8", "In Progress":"#2563EB", "On Hold":"#D97706", Completed:"#059669", Overdue:"#DC2626" };

/* ═══ GITHUB SYNC ═══ */
const gh = {
  token:()=>localStorage.getItem("gh_token")||"",
  headers:()=>({"Authorization":"token "+(localStorage.getItem("gh_token")||""),"Content-Type":"application/json","Accept":"application/vnd.github+json"}),
  async load(){const r=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+DATA_FILE,{headers:this.headers()});if(r.status===404)return{data:null,sha:null};if(!r.ok)throw new Error("Read failed");const j=await r.json();return{data:JSON.parse(atob(j.content.replace(/\n/g,""))),sha:j.sha};},
  async save(data,sha){const body={message:"Sync: "+new Date().toLocaleString("en-IN"),content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))))};if(sha)body.sha=sha;const r=await fetch("https://api.github.com/repos/"+REPO+"/contents/"+DATA_FILE,{method:"PUT",headers:this.headers(),body:JSON.stringify(body)});if(!r.ok)throw new Error((await r.json()).message||"Save failed");return(await r.json()).content.sha;},
  async testToken(token){try{const r=await fetch("https://api.github.com/repos/"+REPO,{headers:{"Authorization":"token "+token,"Accept":"application/vnd.github+json"}});return r.ok;}catch{return false;}}
};

/* ═══ SMALL COMPONENTS ═══ */
const Badge = ({label,colors}) => <span className="badge" style={{background:colors.bg,color:colors.tx}}>{label}</span>;
function Ring({pct,size=54,stroke=5,color}){const r=(size-stroke)/2,c=2*Math.PI*r;return<svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E5E7EB" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} strokeLinecap="round"/></svg>;}
function Modal({title,onClose,children}){return<div className="modal-overlay" onClick={onClose}><div className="modal-box" onClick={e=>e.stopPropagation()}><div className="modal-header"><h2 className="modal-title">{title}</h2><button className="modal-close" onClick={onClose}>&times;</button></div>{children}</div></div>;}

/* ═══════════════════════════════════════════
/* ═══════════════════════════════════════════
   INTERACTIVE EXPANDABLE MINDMAP v2
   Pan, Zoom, No Overlaps
   ═══════════════════════════════════════════ */
const NODE_H = 40;
const NODE_GAP = 6;
const LEVEL_W = 220;

function buildJourneyTree(projects, tasks, milestones) {
  return {
    id: "root", label: PROFILE.initials, sub: projects.length + " projects", color: "#1E3A5F", isRoot: true,
    children: projects.map(p => {
      const pT = tasks.filter(t => t.projectId === p.id);
      const pM = milestones.filter(m => m.projectId === p.id);
      const done = pT.filter(t => t.status === "Completed").length;
      const pct = pT.length ? Math.round(done / pT.length * 100) : 0;
      const groups = {};
      pT.forEach(t => {
        const isOv = t.status !== "Completed" && t.deadline && t.deadline < todayStr();
        const key = isOv ? "Overdue" : t.status;
        if (!groups[key]) groups[key] = [];
        groups[key].push(t);
      });
      const statusChildren = Object.entries(groups).map(([status, items]) => ({
        id: p.id + "-" + status, label: status, sub: items.length + " tasks", color: SC[status] || "#64748B",
        children: items.map(t => ({
          id: t.id, label: t.title.length > 32 ? t.title.slice(0,32) + "…" : t.title,
          sub: (t.deadline ? fmtDate(t.deadline) : "") + (t.assignedBy ? " • " + t.assignedBy : ""),
          color: SC[status] || "#64748B", isLeaf: true, priority: t.priority
        }))
      }));
      if (pM.length) {
        statusChildren.push({
          id: p.id + "-milestones", label: "Milestones", sub: pM.length + " items", color: "#7C3AED",
          children: pM.map(m => ({
            id: m.id, label: m.title.length > 32 ? m.title.slice(0,32) + "…" : m.title,
            sub: m.progress + "% • " + fmtDate(m.targetDate), color: "#7C3AED", isLeaf: true
          }))
        });
      }
      return { id: p.id, label: p.name, sub: pct + "% • " + pT.length + " tasks", color: p.color, children: statusChildren };
    })
  };
}

function buildProjectTree(project, tasks, milestones, logs) {
  const pct = tasks.length ? Math.round(tasks.filter(t => t.status === "Completed").length / tasks.length * 100) : 0;
  const groups = {};
  tasks.forEach(t => {
    const isOv = t.status !== "Completed" && t.deadline && t.deadline < todayStr();
    const key = isOv ? "Overdue" : t.status;
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });
  const children = Object.entries(groups).map(([status, items]) => ({
    id: project.id + "-" + status, label: status, sub: items.length + " tasks", color: SC[status] || "#64748B",
    children: items.map(t => ({
      id: t.id, label: t.title.length > 35 ? t.title.slice(0,35) + "…" : t.title,
      sub: [t.priority, t.deadline ? fmtDate(t.deadline) : "", t.assignedBy ? "By: " + t.assignedBy : ""].filter(Boolean).join(" • "),
      color: SC[status] || "#64748B", isLeaf: true, priority: t.priority
    }))
  }));
  if (milestones.length) children.push({ id: project.id + "-ms", label: "Milestones", sub: milestones.length, color: "#7C3AED", children: milestones.map(m => ({ id: m.id, label: m.title.length > 35 ? m.title.slice(0,35) + "…" : m.title, sub: m.progress + "% • " + m.status, color: "#7C3AED", isLeaf: true })) });
  if (logs.length) children.push({ id: project.id + "-logs", label: "Activity Log", sub: logs.length + " entries", color: "#8B5CF6", children: logs.slice(0,20).map(l => ({ id: l.id, label: l.activity.length > 38 ? l.activity.slice(0,38) + "…" : l.activity, sub: fmtDate(l.date) + (l.duration ? " • " + l.duration : ""), color: "#8B5CF6", isLeaf: true })) });
  return { id: "proj-root", label: project.name, sub: pct + "% complete", color: project.color, isRoot: true, children };
}

// Proper tree layout: returns { items, totalHeight }
function layoutTree(node, expanded, yStart, level) {
  const result = [];
  const x = level * LEVEL_W;
  const hasVisibleChildren = node.children && node.children.length > 0 && expanded.has(node.id);

  if (!hasVisibleChildren) {
    result.push({ ...node, x, y: yStart, level });
    return { items: result, totalHeight: NODE_H };
  }

  // Layout children first to know total height
  let childY = yStart;
  const childResults = [];
  for (let i = 0; i < node.children.length; i++) {
    const cl = layoutTree(node.children[i], expanded, childY, level + 1);
    childResults.push(cl);
    childY += cl.totalHeight;
    if (i < node.children.length - 1) childY += NODE_GAP;
  }
  const totalChildH = childY - yStart;

  // Parent centered among children
  const firstChildY = childResults[0].items[0].y;
  const lastChild = childResults[childResults.length - 1].items[0];
  const parentY = (firstChildY + lastChild.y) / 2;

  result.push({ ...node, x, y: parentY, level });
  childResults.forEach(cr => result.push(...cr.items));

  return { items: result, totalHeight: Math.max(totalChildH, NODE_H) };
}

function InteractiveMindMap({ tree, title }) {
  const [expanded, setExpanded] = useState(() => {
    const s = new Set(["root", "proj-root"]);
    if (tree.children) tree.children.forEach(c => s.add(c.id));
    return s;
  });

  // Pan & Zoom state
  const [pan, setPan] = useState({ x: 0, y: 0 });
  const [scale, setScale] = useState(1);
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef({ x: 0, y: 0, panX: 0, panY: 0 });
  const containerRef = useRef(null);

  const toggle = id => {
    setExpanded(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  };

  const expandAll = () => {
    const s = new Set();
    const walk = n => { s.add(n.id); if (n.children) n.children.forEach(walk); };
    walk(tree); setExpanded(s);
  };
  const collapseAll = () => {
    const s = new Set(["root", "proj-root"]);
    if (tree.children) tree.children.forEach(c => s.add(c.id));
    setExpanded(s);
  };
  const resetView = () => { setPan({ x: 0, y: 0 }); setScale(1); };
  const zoomIn = () => setScale(s => Math.min(s * 1.25, 3));
  const zoomOut = () => setScale(s => Math.max(s / 1.25, 0.25));

  // Mouse/touch pan handlers
  const onPointerDown = e => {
    if (e.target.closest('.mm-pill')) return; // don't pan when clicking nodes
    setDragging(true);
    dragStart.current = { x: e.clientX, y: e.clientY, panX: pan.x, panY: pan.y };
    e.currentTarget.style.cursor = 'grabbing';
  };
  const onPointerMove = e => {
    if (!dragging) return;
    const dx = e.clientX - dragStart.current.x;
    const dy = e.clientY - dragStart.current.y;
    setPan({ x: dragStart.current.panX + dx, y: dragStart.current.panY + dy });
  };
  const onPointerUp = e => {
    setDragging(false);
    if (e.currentTarget) e.currentTarget.style.cursor = 'grab';
  };
  const onWheel = e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    setScale(s => Math.min(Math.max(s * delta, 0.2), 3));
  };

  // Layout computation
  const { allNodes, canvasW, canvasH, offsetX, offsetY } = useMemo(() => {
    if (!tree.children || !tree.children.length) {
      return { allNodes: [{ ...tree, x: 0, y: 0, level: 0 }], canvasW: 300, canvasH: 100, offsetX: 40, offsetY: 50 };
    }
    const layout = layoutTree(tree, expanded, 0, 0);
    const nodes = layout.items;
    const minX = Math.min(...nodes.map(n => n.x));
    const maxX = Math.max(...nodes.map(n => n.x));
    const minY = Math.min(...nodes.map(n => n.y));
    const maxY = Math.max(...nodes.map(n => n.y));
    const padX = 60, padY = 40, nodeW = 200;
    return {
      allNodes: nodes,
      canvasW: (maxX - minX) + nodeW + padX * 2,
      canvasH: (maxY - minY) + NODE_H + padY * 2,
      offsetX: -minX + padX,
      offsetY: -minY + padY
    };
  }, [tree, expanded]);

  // Parent map for drawing lines
  const parentMap = useMemo(() => {
    const m = {};
    const walk = node => {
      if (node.children && expanded.has(node.id)) {
        node.children.forEach(c => { m[c.id] = node.id; walk(c); });
      }
    };
    walk(tree); return m;
  }, [tree, expanded]);

  const nodeById = useMemo(() => {
    const m = {}; allNodes.forEach(n => m[n.id] = n); return m;
  }, [allNodes]);

  const lines = useMemo(() => {
    return allNodes.filter(n => parentMap[n.id] && nodeById[parentMap[n.id]]).map(n => {
      const parent = nodeById[parentMap[n.id]];
      const px = parent.x + offsetX + (parent.isRoot ? 90 : 75);
      const py = parent.y + offsetY + NODE_H / 2;
      const cx_ = n.x + offsetX - 4;
      const cy_ = n.y + offsetY + NODE_H / 2;
      const cpx = px + (cx_ - px) * 0.5;
      return { key: n.id, d: `M${px},${py} C${cpx},${py} ${cpx},${cy_} ${cx_},${cy_}`, color: n.color };
    });
  }, [allNodes, parentMap, nodeById, offsetX, offsetY]);

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
        <h2 style={{ fontSize: 16, fontWeight: 800 }}>{title}</h2>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }} className="no-print">
          <button className="btn btn-secondary btn-sm" onClick={expandAll}>Expand All</button>
          <button className="btn btn-secondary btn-sm" onClick={collapseAll}>Collapse</button>
          <span style={{ width: 1, height: 20, background: "#E2E8F0" }} />
          <button className="btn btn-secondary btn-sm" onClick={zoomIn}>🔍+</button>
          <button className="btn btn-secondary btn-sm" onClick={zoomOut}>🔍−</button>
          <button className="btn btn-secondary btn-sm" onClick={resetView}>Reset</button>
          <span style={{ fontSize: 11, color: "#94A3B8", minWidth: 40 }}>{Math.round(scale * 100)}%</span>
        </div>
      </div>
      <div className="mm-container" style={{ height: 500, cursor: dragging ? 'grabbing' : 'grab', overflow: 'hidden', touchAction: 'none' }}
        ref={containerRef}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerLeave={onPointerUp}
        onWheel={onWheel}>
        <div style={{
          transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})`,
          transformOrigin: '0 0',
          position: 'relative',
          width: canvasW,
          height: canvasH,
          transition: dragging ? 'none' : 'transform 0.15s ease-out'
        }}>
          <svg style={{ position: 'absolute', top: 0, left: 0, width: canvasW, height: canvasH, pointerEvents: 'none', overflow: 'visible' }}>
            {lines.map(l => <path key={l.key} d={l.d} fill="none" stroke={l.color} strokeWidth="2" opacity="0.3" />)}
          </svg>
          {allNodes.map(n => {
            const hasChildren = n.children && n.children.length > 0;
            const isExp = expanded.has(n.id);
            const nx = n.x + offsetX;
            const ny = n.y + offsetY;
            return (
              <div key={n.id} style={{
                position: 'absolute', left: nx, top: ny, height: NODE_H,
                display: 'flex', alignItems: 'center', zIndex: 2, whiteSpace: 'nowrap'
              }}>
                <div className="mm-pill" onClick={e => { e.stopPropagation(); if (hasChildren) toggle(n.id); }}
                  style={{
                    background: n.isRoot ? n.color + '18' : n.isLeaf ? '#fff' : n.color + '10',
                    borderColor: n.color + (n.isLeaf ? '40' : '60'),
                    color: n.color,
                    padding: n.isRoot ? '8px 20px' : n.isLeaf ? '4px 12px' : '5px 14px',
                    fontSize: n.isRoot ? 14 : n.isLeaf ? 11 : 12,
                    fontWeight: n.isRoot ? 800 : n.isLeaf ? 600 : 700,
                    borderRadius: n.isRoot ? 14 : 9,
                    borderWidth: n.isRoot ? 2.5 : n.isLeaf ? 1.5 : 2,
                    cursor: hasChildren ? 'pointer' : 'default',
                    boxShadow: n.isRoot ? '0 4px 16px ' + n.color + '20' : 'none',
                    display: 'flex', alignItems: 'center', gap: 7,
                    userSelect: 'none',
                    transition: 'box-shadow .15s, background .15s'
                  }}
                  onMouseEnter={e => { if (!n.isLeaf) e.currentTarget.style.boxShadow = '0 4px 20px ' + n.color + '25'; }}
                  onMouseLeave={e => { if (!n.isRoot) e.currentTarget.style.boxShadow = 'none'; }}>
                  {hasChildren && (
                    <span style={{
                      width: 20, height: 20, borderRadius: '50%', background: n.color,
                      color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontSize: 13, fontWeight: 800, flexShrink: 0, lineHeight: 1
                    }}>{isExp ? '−' : '+'}</span>
                  )}
                  {n.isLeaf && n.priority && (
                    <span style={{
                      width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
                      background: n.priority === 'High' ? '#EF4444' : n.priority === 'Medium' ? '#F59E0B' : '#3B82F6'
                    }} />
                  )}
                  <span>{n.label}</span>
                  {hasChildren && !n.isRoot && <span style={{ fontSize: 10, opacity: 0.6 }}>({n.children.length})</span>}
                  {n.sub && <span style={{ fontSize: n.isLeaf ? 9 : 10, color: '#94A3B8', fontWeight: 500, marginLeft: 3 }}>{n.sub}</span>}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ position: 'absolute', bottom: 10, left: 16, fontSize: 11, color: '#94A3B8', zIndex: 5, pointerEvents: 'none' }} className="no-print">
          Drag to pan • Scroll to zoom • Click nodes to expand
        </div>
      </div>
      <div className="mm-legend">
        <span><span className="mm-legend-dot" style={{background:"#059669"}}/> Completed</span>
        <span><span className="mm-legend-dot" style={{background:"#2563EB"}}/> In Progress</span>
        <span><span className="mm-legend-dot" style={{background:"#94A3B8"}}/> Not Started</span>
        <span><span className="mm-legend-dot" style={{background:"#D97706"}}/> On Hold</span>
        <span><span className="mm-legend-dot" style={{background:"#DC2626"}}/> Overdue</span>
        <span><span className="mm-legend-dot" style={{background:"#7C3AED"}}/> Milestones</span>
        <span style={{marginLeft:8}}>● <span style={{fontSize:10}}>Priority:</span> <span style={{color:"#EF4444"}}>High</span> <span style={{color:"#F59E0B"}}>Med</span> <span style={{color:"#3B82F6"}}>Low</span></span>
      </div>
    </div>
  );
}

/* ═══ AI AGENT TOOL DEFINITIONS ═══ */
const AGENT_TOOLS = [
  { name: "create_project", description: "Create a new project in the dashboard.",
    properties: { name: { type: "string", description: "Project name" }, description: { type: "string", description: "Short scope description" }, owner: { type: "string", description: "Stakeholder / senior manager name" }, targetEnd: { type: "string", description: "Target end date, format YYYY-MM-DD" } },
    required: ["name"] },
  { name: "create_task", description: "Create a new task under an existing project.",
    properties: { title: { type: "string", description: "Task title" }, projectId: { type: "string", description: "The id of an existing project from the data (or its name if id unknown)" }, priority: { type: "string", description: "High, Medium, or Low" }, deadline: { type: "string", description: "YYYY-MM-DD" }, assignedBy: { type: "string", description: "Who assigned this task" }, source: { type: "string", description: "Email, Meeting, Chat, Project Tool, or Self" }, description: { type: "string", description: "Task details" } },
    required: ["title", "projectId"] },
  { name: "create_log", description: "Add a daily activity log entry, optionally linked to a project.",
    properties: { activity: { type: "string", description: "What was done" }, duration: { type: "string", description: "e.g. '2 hours', '30 min'" }, projectId: { type: "string", description: "Project id or name (optional)" }, category: { type: "string", description: "One of: Meeting / Call, Task Progress, Email / Follow-up, Review / Approval, Problem Solving, Coordination, Learning / Training, Reporting / MIS" }, outcome: { type: "string", description: "Result achieved" } },
    required: ["activity"] },
  { name: "create_milestone", description: "Add a milestone to a project.",
    properties: { title: { type: "string" }, projectId: { type: "string", description: "Project id or name" }, targetDate: { type: "string", description: "YYYY-MM-DD" }, progress: { type: "number", description: "0 to 100" } },
    required: ["title"] },
  { name: "update_task_status", description: "Update the status of an existing task by matching its title text.",
    properties: { taskTitle: { type: "string", description: "Exact or partial title of the task to find" }, newStatus: { type: "string", description: "Not Started, In Progress, On Hold, or Completed" } },
    required: ["taskTitle", "newStatus"] }
];

const anthropicToolSchema = () => AGENT_TOOLS.map(t => ({ name: t.name, description: t.description, input_schema: { type: "object", properties: t.properties, required: t.required } }));
const groqToolSchema = () => AGENT_TOOLS.map(t => ({ type: "function", function: { name: t.name, description: t.description, parameters: { type: "object", properties: t.properties, required: t.required } } }));
const geminiTypeMap = { string: "STRING", number: "NUMBER", boolean: "BOOLEAN" };
const geminiToolSchema = () => [{ function_declarations: AGENT_TOOLS.map(t => {
  const props = {}; Object.entries(t.properties).forEach(([k, v]) => { props[k] = { type: geminiTypeMap[v.type] || "STRING", description: v.description || "" }; });
  return { name: t.name, description: t.description, parameters: { type: "OBJECT", properties: props, required: t.required } };
}) }];

function toolLabel(name, args) {
  if (name === "create_project") return "Creating project \"" + (args.name || "") + "\"";
  if (name === "create_task") return "Adding task \"" + (args.title || "") + "\"";
  if (name === "create_log") return "Logging activity: \"" + (args.activity || "").slice(0, 40) + "\"";
  if (name === "create_milestone") return "Adding milestone \"" + (args.title || "") + "\"";
  if (name === "update_task_status") return "Updating \"" + (args.taskTitle || "") + "\" → " + (args.newStatus || "");
  return "Running " + name;
}

/* ═══ AI ASSISTANT AGENT ═══ */
function AIAssistant({ projects, tasks, logs, milestones, onAddProject, onAddTask, onUpdateTask, onAddLog, onAddMilestone }) {
  const [provider, setProvider] = useState(() => localStorage.getItem("ai_provider") || "");
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("ai_key") || "");
  const [keyInput, setKeyInput] = useState("");
  const [providerPick, setProviderPick] = useState("");
  const WELCOME_MSG = { role: "assistant", text: "Hi Pranav! I'm your project assistant. I can see all your data — ask me anything about your projects, tasks, time logs, or say things like \"add a task\" or \"log today's standup meeting\". What do you need?" };
  const [messages, setMessages] = useState(() => {
    try {
      const saved = localStorage.getItem("ai_chat_history");
      if (saved) { const parsed = JSON.parse(saved); if (Array.isArray(parsed) && parsed.length) return parsed; }
    } catch (e) {}
    return [WELCOME_MSG];
  });
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const chatEnd = useRef(null);
  useEffect(function() { if (chatEnd.current) chatEnd.current.scrollIntoView({ behavior: "smooth" }); }, [messages]);
  useEffect(function() { try { localStorage.setItem("ai_chat_history", JSON.stringify(messages)); } catch (e) {} }, [messages]);
  const clearChat = () => { setMessages([WELCOME_MSG]); try { localStorage.removeItem("ai_chat_history"); } catch (e) {} };

  const [ollamaModel, setOllamaModel] = useState(() => localStorage.getItem("ai_ollama_model") || "llama3.1");
  const [modelInput, setModelInput] = useState(() => localStorage.getItem("ai_ollama_model") || "llama3.1");

  const saveKey = () => {
    if (!providerPick) return;
    if (providerPick === "ollama") {
      const url = (keyInput.trim() || "http://localhost:11434").replace(/\/$/, "");
      localStorage.setItem("ai_key", url);
      localStorage.setItem("ai_provider", "ollama");
      localStorage.setItem("ai_ollama_model", modelInput.trim() || "llama3.1");
      setApiKey(url); setProvider("ollama"); setOllamaModel(modelInput.trim() || "llama3.1");
      return;
    }
    if (keyInput.trim()) {
      localStorage.setItem("ai_key", keyInput.trim());
      localStorage.setItem("ai_provider", providerPick);
      setApiKey(keyInput.trim());
      setProvider(providerPick);
    }
  };
  const clearKey = () => {
    localStorage.removeItem("ai_key"); localStorage.removeItem("ai_provider"); localStorage.removeItem("ai_ollama_model");
    setApiKey(""); setProvider(""); setKeyInput(""); setProviderPick(""); setModelInput("llama3.1");
  };

  const QUICK = [
    "What should I focus on today?",
    "Give me a weekly summary",
    "Which tasks are overdue?",
    "How is my time distributed?",
    "Add a task for me",
    "Log today's standup meeting"
  ];

  const buildSystemPrompt = () => {
    const now = todayStr();
    const overdue = tasks.filter(t => t.status !== "Completed" && t.deadline && t.deadline < now);
    const inProg = tasks.filter(t => t.status === "In Progress");
    const recentLogs = logs.slice(0, 8);
    const ctx = `TODAY: ${now}\nPROFILE: ${PROFILE.name}, ${PROFILE.role}\n\nPROJECTS (${projects.length}):\n${projects.map(p => { const pT=tasks.filter(t=>t.projectId===p.id); const done=pT.filter(t=>t.status==="Completed").length; const pct=pT.length?Math.round(done/pT.length*100):0; return "- "+p.name+" [id:"+p.id+"] ("+pct+"% done, "+pT.length+" tasks, stakeholder: "+(p.owner||"N/A")+", deadline: "+(p.targetEnd||"N/A")+")"; }).join("\n")}\n\nALL TASKS (${tasks.length}):\n${tasks.map(t => { const proj=projects.find(p=>p.id===t.projectId); const isOv=t.status!=="Completed"&&t.deadline&&t.deadline<now; return "- ["+(isOv?"OVERDUE":t.status)+'] "'+t.title+'" | Project: '+(proj?.name||"?")+" ["+t.projectId+"] | Priority: "+t.priority+" | Deadline: "+(t.deadline||"none")+" | By: "+(t.assignedBy||"self")+" | Source: "+t.source; }).join("\n")}\n\nOVERDUE (${overdue.length}): ${overdue.map(t=>'"'+t.title+'" ('+daysBetween(now,t.deadline)+"d late)").join(", ")||"None"}\nIN PROGRESS (${inProg.length}): ${inProg.map(t=>'"'+t.title+'"').join(", ")||"None"}\n\nMILESTONES (${milestones.length}):\n${milestones.map(m => { const proj=projects.find(p=>p.id===m.projectId); return '- "'+m.title+'" | Project: '+(proj?.name||"?")+" ["+m.projectId+"] | "+m.progress+"% | Status: "+m.status+" | Target: "+(m.targetDate||"N/A"); }).join("\n")}\n\nRECENT LOGS (last 8):\n${recentLogs.map(l => { const proj=projects.find(p=>p.id===l.projectId); return "- "+l.date+" | "+(l.duration||"?")+" | "+(l.category||"")+" | \""+l.activity+'" | Project: '+(proj?.name||"General")+" | Outcome: "+(l.outcome||"N/A"); }).join("\n")}`;

    return `You are Pranav Kulkarni's personal project assistant embedded in his Project Command Center dashboard. You have access to ALL his current project data below, and you have tools to create projects, tasks, logs, and milestones, and to update task status.

RULES:
- Be concise and direct. Use short paragraphs, not long essays.
- When asked analytical questions, reference specific data (project names, task counts, dates).
- When the user asks you to add/create/log/update something, use the appropriate tool. You may call multiple tools in sequence if the request needs it (e.g. "create a project and add 3 tasks to it").
- CRITICAL: Never say something was created, added, updated, or logged unless you actually called the matching tool in this turn and it succeeded. Do not describe a project/task/log/milestone as done, give it an ID, or write confirmation text like "has been created" without a real tool call behind it. If you're not calling a tool, don't claim an action happened — just answer or ask a clarifying question instead.
- Always use an existing project's id from the data when given. If the user names a project that doesn't exist yet, ask whether to create it first (or create it if that seems clearly intended).
- After using tools, give a short natural confirmation summarizing what you did.
- For weekly summaries or analysis questions, give a structured brief: tasks completed, in progress, overdue, key activity, recommendations — no tool needed for these.
- Be encouraging but professional. This data may be shown to senior leadership.

DATA:\n${ctx}`;
  };

  const resolveProjectId = (idOrName) => {
    if (!idOrName) return "";
    const direct = projects.find(p => p.id === idOrName);
    if (direct) return direct.id;
    const byName = projects.find(p => p.name.toLowerCase().includes(String(idOrName).toLowerCase()));
    return byName ? byName.id : idOrName;
  };

  const executeTool = (name, args) => {
    try {
      if (name === "create_project") {
        const newProj = { id: uid(), name: args.name, description: args.description || "", owner: args.owner || "", startDate: todayStr(), targetEnd: args.targetEnd || "", color: PROJECT_COLORS[Math.floor(Math.random() * PROJECT_COLORS.length)], createdAt: todayStr() };
        onAddProject(newProj);
        return { success: true, message: "Created project '" + newProj.name + "'", projectId: newProj.id };
      }
      if (name === "create_task") {
        const pid = resolveProjectId(args.projectId);
        const task = { id: uid(), title: args.title, description: args.description || "", assignedBy: args.assignedBy || "", source: args.source || "Self", priority: args.priority || "Medium", status: "Not Started", deadline: args.deadline || "", projectId: pid, remarks: "", createdAt: todayStr(), updatedAt: todayStr() };
        onAddTask(task);
        return { success: true, message: "Created task '" + task.title + "'" };
      }
      if (name === "create_log") {
        const pid = resolveProjectId(args.projectId);
        const log = { id: uid(), date: todayStr(), activity: args.activity, duration: args.duration || "", projectId: pid, category: args.category || "Task Progress", outcome: args.outcome || "" };
        onAddLog(log);
        return { success: true, message: "Logged: '" + log.activity + "'" };
      }
      if (name === "create_milestone") {
        const pid = resolveProjectId(args.projectId);
        const ms = { id: uid(), title: args.title, projectId: pid, targetDate: args.targetDate || "", status: "Not Started", progress: args.progress || 0, notes: "" };
        onAddMilestone(ms);
        return { success: true, message: "Created milestone '" + ms.title + "'" };
      }
      if (name === "update_task_status") {
        const match = tasks.find(t => t.title.toLowerCase().includes(String(args.taskTitle || "").toLowerCase()));
        if (!match) return { success: false, message: "No task found matching '" + args.taskTitle + "'" };
        onUpdateTask({ ...match, status: args.newStatus, updatedAt: todayStr() });
        return { success: true, message: "Updated '" + match.title + "' to " + args.newStatus };
      }
      return { success: false, message: "Unknown tool: " + name };
    } catch (e) {
      return { success: false, message: "Error executing " + name + ": " + e.message };
    }
  };

  const runAnthropicAgent = async (userText, history, onTrace) => {
    const sysPrompt = buildSystemPrompt();
    let msgs = [];
    history.forEach(m => { if (m.role === "user" || m.role === "assistant") msgs.push({ role: m.role, content: m.text }); });
    msgs.push({ role: "user", content: userText });
    const tools = anthropicToolSchema();

    for (let step = 0; step < 6; step++) {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1024, system: sysPrompt, tools, messages: msgs })
      });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || "Anthropic API error: " + r.status); }
      const data = await r.json();
      const content = data.content || [];
      const toolUses = content.filter(c => c.type === "tool_use");
      const textParts = content.filter(c => c.type === "text").map(c => c.text).join("");
      if (toolUses.length === 0) return textParts || "Done!";

      msgs.push({ role: "assistant", content });
      const toolResults = toolUses.map(tu => {
        onTrace(tu.name, tu.input);
        const result = executeTool(tu.name, tu.input);
        return { type: "tool_result", tool_use_id: tu.id, content: JSON.stringify(result) };
      });
      msgs.push({ role: "user", content: toolResults });
    }
    return "I've completed the requested actions.";
  };

  const runGroqAgent = async (userText, history, onTrace) => {
    const sysPrompt = buildSystemPrompt();
    let msgs = [{ role: "system", content: sysPrompt }];
    history.forEach(m => { if (m.role === "user" || m.role === "assistant") msgs.push({ role: m.role, content: m.text }); });
    msgs.push({ role: "user", content: userText });
    const tools = groqToolSchema();

    for (let step = 0; step < 6; step++) {
      const r = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
        body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: msgs, tools, tool_choice: "auto", max_tokens: 1024 })
      });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || "Groq API error: " + r.status); }
      const data = await r.json();
      const msg = data.choices?.[0]?.message;
      if (!msg) throw new Error("Empty response from Groq.");
      if (msg.tool_calls && msg.tool_calls.length) {
        msgs.push(msg);
        msg.tool_calls.forEach(tc => {
          let args = {}; try { args = JSON.parse(tc.function.arguments || "{}"); } catch (e) {}
          onTrace(tc.function.name, args);
          const result = executeTool(tc.function.name, args);
          msgs.push({ role: "tool", tool_call_id: tc.id, content: JSON.stringify(result) });
        });
        continue;
      }
      return msg.content || "Done!";
    }
    return "I've completed the requested actions.";
  };

  const runGeminiAgent = async (userText, history, onTrace) => {
    const sysPrompt = buildSystemPrompt();
    let contents = [];
    history.forEach(m => {
      if (m.role === "user") contents.push({ role: "user", parts: [{ text: m.text }] });
      else if (m.role === "assistant") contents.push({ role: "model", parts: [{ text: m.text }] });
    });
    contents.push({ role: "user", parts: [{ text: userText }] });
    const tools = geminiToolSchema();

    for (let step = 0; step < 6; step++) {
      const r = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + apiKey, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system_instruction: { parts: [{ text: sysPrompt }] }, tools, contents })
      });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || "Gemini API error: " + r.status); }
      const data = await r.json();
      const cand = data.candidates?.[0];
      const parts = cand?.content?.parts || [];
      const fnCalls = parts.filter(p => p.functionCall);
      const textParts = parts.filter(p => p.text).map(p => p.text).join("");
      if (fnCalls.length === 0) return textParts || "Done!";

      contents.push({ role: "model", parts });
      const responseParts = fnCalls.map(fc => {
        onTrace(fc.functionCall.name, fc.functionCall.args || {});
        const result = executeTool(fc.functionCall.name, fc.functionCall.args || {});
        return { functionResponse: { name: fc.functionCall.name, response: result } };
      });
      contents.push({ role: "user", parts: responseParts });
    }
    return "I've completed the requested actions.";
  };

  const runOllamaAgent = async (userText, history, onTrace) => {
    const sysPrompt = buildSystemPrompt();
    let msgs = [{ role: "system", content: sysPrompt }];
    history.forEach(m => { if (m.role === "user" || m.role === "assistant") msgs.push({ role: m.role, content: m.text }); });
    msgs.push({ role: "user", content: userText });
    const tools = groqToolSchema(); // OpenAI-compatible format, same as Groq

    for (let step = 0; step < 6; step++) {
      let r;
      try {
        r = await fetch(apiKey + "/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: ollamaModel, messages: msgs, tools, tool_choice: "auto", max_tokens: 1024 })
        });
      } catch (netErr) {
        throw new Error("Can't reach Ollama at " + apiKey + ". Make sure Ollama is running locally and OLLAMA_ORIGINS allows this site.");
      }
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || ("Ollama error: " + r.status + ". Check the model name '" + ollamaModel + "' is pulled (run: ollama pull " + ollamaModel + ")")); }
      const data = await r.json();
      const msg = data.choices?.[0]?.message;
      if (!msg) throw new Error("Empty response from Ollama.");
      if (msg.tool_calls && msg.tool_calls.length) {
        msgs.push(msg);
        msg.tool_calls.forEach(tc => {
          let args = {}; try { args = JSON.parse(tc.function.arguments || "{}"); } catch (e) {}
          onTrace(tc.function.name, args);
          const result = executeTool(tc.function.name, args);
          msgs.push({ role: "tool", tool_call_id: tc.id || uid(), content: JSON.stringify(result) });
        });
        continue;
      }
      return msg.content || "Done!";
    }
    return "I've completed the requested actions.";
  };

  const sendMessage = async (text) => {
    if (!text.trim() || loading) return;
    const userText = text.trim();
    setMessages(prev => [...prev, { role: "user", text: userText }]);
    setInput("");
    setLoading(true);

    let toolCallCount = 0;
    const onTrace = (name, args) => {
      toolCallCount++;
      setMessages(prev => [...prev, { role: "trace", text: "🔧 " + toolLabel(name, args) }]);
    };

    try {
      // Only send the last few exchanges — full history resent every turn was the main cause
      // of burning through daily token quotas fast on free tiers like Groq.
      const fullHistory = messages.slice(1).filter(m => m.role === "user" || m.role === "assistant");
      const history = fullHistory.slice(-8);
      let reply;

      }

      setMessages(prev => [...prev, { role: "assistant", text: reply || "Done!" }]);

/* ═══ WHIZIBLE TIMESHEET EXPORT ═══ */
function WhizibleExport({ logs, projects }) {
  const [open, setOpen] = useState(false);
  const [fromDate, setFromDate] = useState(() => { const d = new Date(); d.setDate(d.getDate() - d.getDay() + 1); return d.toISOString().split("T")[0]; });
  const [toDate, setToDate] = useState(todayStr());
  const [output, setOutput] = useState("");
  const [copied, setCopied] = useState(false);

  const generate = () => {
    const inRange = logs.filter(l => l.date >= fromDate && l.date <= toDate);
    const byDate = {};
    inRange.forEach(l => { if (!byDate[l.date]) byDate[l.date] = []; byDate[l.date].push(l); });
    const dates = Object.keys(byDate).sort();

    if (!dates.length) { setOutput("No log entries found in that date range."); return; }

    let text = "";
    dates.forEach(date => {
      const entries = byDate[date];
      const dayName = new Date(date).toLocaleDateString("en-IN", { weekday: "short" });
      const d = date.split("-");
      text += dayName + " " + d[2] + "-" + new Date(date).toLocaleDateString("en-IN", { month: "short" }) + "-" + d[0] + ":\n";
      let totalHrs = 0;
      entries.forEach(l => {
        const proj = projects.find(p => p.id === l.projectId);
        const jobCode = proj?.jobCode || "(no job code set)";
        const taskCode = l.taskCode || "(no task code set)";
        const mins = parseMins(l.duration);
        const hrs = mins ? Math.round((mins / 60) * 10) / 10 : 0;
        totalHrs += hrs;
        text += "  Job=" + jobCode + ", Task=" + taskCode + ", Hours=" + hrs + "\n";
        text += "    Description: \"" + l.activity + (l.outcome ? " — " + l.outcome : "") + "\"\n";
      });
      const flag = totalHrs === 8.5 ? "✓" : "⚠ expected 8.5";
      text += "  (Daily total = " + totalHrs + " hrs " + flag + ")\n\n";
    });
    setOutput(text.trim());
    setCopied(false);
  };

  const copyOut = () => {
    navigator.clipboard.writeText(output).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  return (
    <div className="card" style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer" }} onClick={() => setOpen(!open)}>
        <div style={{ fontWeight: 700, fontSize: 14 }}>📤 Export for Whizible timesheet</div>
        <span style={{ fontSize: 12, color: "#64748B" }}>{open ? "▲ collapse" : "▼ expand"}</span>
      </div>
      {open && <div style={{ marginTop: 14 }}>
        <p style={{ fontSize: 12, color: "#64748B", marginBottom: 12, lineHeight: 1.5 }}>
          Generates a formatted block from your log entries for a date range, matching the Job/Task/Hours/Description format Whizible needs. Copy it and hand it to Claude in Chrome along with your process notes to auto-fill.
        </p>
        <div className="grid-2" style={{ marginBottom: 10 }}>
          <div className="field"><label className="field-label">From</label><input type="date" className="field-input" value={fromDate} onChange={e => setFromDate(e.target.value)} /></div>
          <div className="field"><label className="field-label">To</label><input type="date" className="field-input" value={toDate} onChange={e => setToDate(e.target.value)} /></div>
        </div>
        <button className="btn btn-primary" onClick={generate} style={{ marginBottom: 12 }}>Generate export</button>
        {output && <>
          <textarea readOnly value={output} style={{ width: "100%", minHeight: 220, fontFamily: "monospace", fontSize: 12, padding: 12, border: "1px solid #E2E8F0", borderRadius: 8, background: "#F8FAFC", boxSizing: "border-box" }} />
          <button className="btn btn-secondary" onClick={copyOut} style={{ marginTop: 8 }}>{copied ? "✓ Copied!" : "📋 Copy to clipboard"}</button>
        </>}
      </div>}
    </div>
  );
}

/* ═══ TIME DISTRIBUTION DASHBOARD ═══ */
function parseMins(dur) {
  if (!dur) return 0;
  const s = dur.toLowerCase().trim();
  if (s === "full day") return 480;
  if (s === "half day") return 240;
  let mins = 0;
  const hm = s.match(/([\d.]+)\s*h/); if (hm) mins += parseFloat(hm[1]) * 60;
  const mm = s.match(/([\d.]+)\s*m/); if (mm) mins += parseFloat(mm[1]);
  if (mins === 0) { const n = parseFloat(s); if (!isNaN(n)) mins = n > 10 ? n : n * 60; }
  return Math.round(mins);
}
function fmtMins(m) { if (m < 60) return m + "m"; const h = Math.floor(m/60); const rm = m % 60; return rm ? h + "h " + rm + "m" : h + "h"; }

const CAT_COLORS = { "Meeting / Call":"#2563EB", "Task Progress":"#059669", "Email / Follow-up":"#0891B2", "Review / Approval":"#7C3AED", "Problem Solving":"#DC2626", "Coordination":"#D97706", "Learning / Training":"#EC4899", "Reporting / MIS":"#4F46E5", "Other":"#64748B" };

function TimeDistribution({ logs }) {
  if (!logs.length) return null;

  // Parse all durations
  const parsed = logs.map(l => ({ ...l, mins: parseMins(l.duration) })).filter(l => l.mins > 0);
  if (!parsed.length) return null;

  const totalMins = parsed.reduce((s, l) => s + l.mins, 0);

  // By category
  const byCat = {};
  parsed.forEach(l => {
    const cat = l.category || "Other";
    byCat[cat] = (byCat[cat] || 0) + l.mins;
  });
  const catEntries = Object.entries(byCat).sort((a, b) => b[1] - a[1]);

  // By date (last 7 active days)
  const byDate = {};
  parsed.forEach(l => { byDate[l.date] = (byDate[l.date] || 0) + l.mins; });
  const dateEntries = Object.entries(byDate).sort((a, b) => a[0].localeCompare(b[0])).slice(-7);
  const maxDay = Math.max(...dateEntries.map(d => d[1]), 60);

  // By project (top projects)
  const byProj = {};
  parsed.forEach(l => { const key = l.projectId || "general"; byProj[key] = (byProj[key] || 0) + l.mins; });

  // Unique days
  const uniqueDays = new Set(parsed.map(l => l.date)).size;
  const avgPerDay = uniqueDays ? Math.round(totalMins / uniqueDays) : 0;

  // Donut chart
  const donutR = 58, donutStroke = 18, donutCx = 75, donutCy = 75;
  const circ = 2 * Math.PI * donutR;
  let donutOffset = 0;
  const donutSegments = catEntries.map(([cat, mins]) => {
    const pct = mins / totalMins;
    const dashLen = pct * circ;
    const seg = { cat, mins, pct, dashLen, offset: donutOffset, color: CAT_COLORS[cat] || "#64748B" };
    donutOffset += dashLen;
    return seg;
  });

  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, marginBottom: 14 }}>
        <div className="stat-card"><div className="stat-label">⏱ TOTAL LOGGED</div><div className="stat-value" style={{ color: "#1E3A5F", fontSize: 22 }}>{fmtMins(totalMins)}</div></div>
        <div className="stat-card"><div className="stat-label">📅 DAYS TRACKED</div><div className="stat-value" style={{ color: "#2563EB", fontSize: 22 }}>{uniqueDays}</div></div>
        <div className="stat-card"><div className="stat-label">📊 AVG / DAY</div><div className="stat-value" style={{ color: "#7C3AED", fontSize: 22 }}>{fmtMins(avgPerDay)}</div></div>
        <div className="stat-card"><div className="stat-label">🏆 TOP CATEGORY</div><div className="stat-value" style={{ color: CAT_COLORS[catEntries[0]?.[0]] || "#059669", fontSize: 14, letterSpacing: 0 }}>{catEntries[0]?.[0] || "—"}</div></div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: 16, background: "#fff", borderRadius: 14, border: "1px solid #E2E8F0", padding: "18px 22px" }}>
        {/* Donut */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>

/* ═══ MAIN APP ═══ */
function App(){
  const[authed,setAuthed]=useState(!!localStorage.getItem("gh_token"));
  const[projects,setProjects]=useState([]);const[tasks,setTasks]=useState([]);const[logs,setLogs]=useState([]);const[milestones,setMilestones]=useState([]);
  const[loading,setLoading]=useState(true);const[syncStatus,setSyncStatus]=useState("loading");const[lastSync,setLastSync]=useState(null);const shaRef=useRef(null);
  const[view,setView]=useState("overview");const[modal,setModal]=useState(null);const[editItem,setEditItem]=useState(null);const[subTab,setSubTab]=useState("tasks");const[filterStatus,setFilterStatus]=useState("All");

  const loadFromGH=useCallback(async()=>{setSyncStatus("loading");try{const{data,sha}=await gh.load();shaRef.current=sha;if(data){setProjects(data.projects||[]);setTasks(data.tasks||[]);setLogs(data.logs||[]);setMilestones(data.milestones||[]);}setSyncStatus("ok");setLastSync(new Date());}catch(e){console.error(e);setSyncStatus("error");}setLoading(false);},[]);
  useEffect(()=>{if(authed)loadFromGH();},[authed,loadFromGH]);
  const saveToGH=useCallback(async(p,t,l,m)=>{setSyncStatus("saving");try{const data={projects:p,tasks:t,logs:l,milestones:m,lastUpdated:new Date().toISOString()};const ns=await gh.save(data,shaRef.current);shaRef.current=ns;setSyncStatus("ok");setLastSync(new Date());}catch(e){console.error(e);if(e.message&&e.message.includes("does not match"))await loadFromGH();setSyncStatus("error");}},[loadFromGH]);

  // Queued, debounced save: prevents concurrent writes from racing and clobbering each other
  // when multiple state changes happen quickly (e.g. AI adding 3 tasks in one turn)
  const savingRef = useRef(false);
  const pendingRef = useRef(false);
  const latestDataRef = useRef({ projects, tasks, logs, milestones });
  latestDataRef.current = { projects, tasks, logs, milestones };

  const flushSave = useCallback(async () => {
    if (savingRef.current) { pendingRef.current = true; return; }
    savingRef.current = true;
    const { projects: p, tasks: t, logs: l, milestones: m } = latestDataRef.current;
    await saveToGH(p, t, l, m);
    savingRef.current = false;
    if (pendingRef.current) { pendingRef.current = false; flushSave(); }
  }, [saveToGH]);

  const debounceRef = useRef(null);
  const scheduleSave = useCallback(() => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => { flushSave(); }, 500);
  }, [flushSave]);

  const skipFirstRef = useRef(true);
  useEffect(() => {
    if (loading) return;
    if (skipFirstRef.current) { skipFirstRef.current = false; return; }
    scheduleSave();
  }, [projects, tasks, logs, milestones, loading, scheduleSave]);

  // All mutations use functional setState (no stale closures) — safe to call rapidly in sequence
  const addProject=p=>{setProjects(prev=>[...prev,p]);setModal(null);};
  const updateProject=p=>{setProjects(prev=>prev.map(x=>x.id===p.id?p:x));setModal(null);setEditItem(null);};
  const deleteProject=id=>{if(!confirm("Delete project and all data?"))return;setProjects(prev=>prev.filter(x=>x.id!==id));setTasks(prev=>prev.filter(x=>x.projectId!==id));setLogs(prev=>prev.filter(x=>x.projectId!==id));setMilestones(prev=>prev.filter(x=>x.projectId!==id));setView("overview");};
  const addTask=t=>{setTasks(prev=>[...prev,t]);setModal(null);};
  const updateTask=t=>{setTasks(prev=>prev.map(x=>x.id===t.id?t:x));setModal(null);setEditItem(null);};
  const deleteTask=id=>setTasks(prev=>prev.filter(x=>x.id!==id));
  const addLog=l=>{setLogs(prev=>[l,...prev]);setModal(null);};
  const deleteLog=id=>setLogs(prev=>prev.filter(x=>x.id!==id));
  const addMilestone=m=>{setMilestones(prev=>[...prev,m]);setModal(null);};
  const deleteMilestone=id=>setMilestones(prev=>prev.filter(x=>x.id!==id));

  const activeProjectId=view.startsWith("project:")?view.split(":")[1]:null;
  const activeProject=projects.find(p=>p.id===activeProjectId);
  const projTasks=pid=>tasks.filter(t=>t.projectId===pid);
  const projLogs=pid=>logs.filter(l=>l.projectId===pid);
  const projMilestones=pid=>milestones.filter(m=>m.projectId===pid);
  const projProgress=pid=>{const t=projTasks(pid);if(!t.length)return 0;return Math.round((t.filter(x=>x.status==="Completed").length/t.length)*100);};
  const totalCompleted=tasks.filter(t=>t.status==="Completed").length;
  const totalOverdue=tasks.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr()).length;
  const totalInProgress=tasks.filter(t=>t.status==="In Progress").length;
  const filteredTasks=useMemo(()=>{let list=activeProjectId?projTasks(activeProjectId):tasks;if(filterStatus!=="All")list=list.filter(t=>{if(filterStatus==="Overdue")return t.status!=="Completed"&&t.deadline&&t.deadline<todayStr();return t.status===filterStatus;});return list.sort((a,b)=>({High:0,Medium:1,Low:2}[a.priority]??1)-({High:0,Medium:1,Low:2}[b.priority]??1));},[tasks,activeProjectId,filterStatus]);

  const journeyTree=useMemo(()=>buildJourneyTree(projects,tasks,milestones),[projects,tasks,milestones]);
  const projectTree=useMemo(()=>activeProject?buildProjectTree(activeProject,projTasks(activeProjectId),projMilestones(activeProjectId),projLogs(activeProjectId)):null,[activeProject,tasks,milestones,logs]);

  if(!authed)return<SetupScreen onDone={()=>setAuthed(true)}/>;
  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#64748B"}}>Loading from GitHub...</div>;
  const syncLabel={loading:"Syncing...",ok:"Synced to GitHub",saving:"Saving...",error:"Sync error"}[syncStatus];

  return(
    <div>
      <div className="sync-bar no-print" style={{background:syncStatus==="error"?"#FEF2F2":"#F0FDF4",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span className={"sync-dot "+(syncStatus==="error"?"error":syncStatus==="saving"?"saving":"ok")}/><span style={{color:syncStatus==="error"?"#DC2626":"#16A34A"}}>{syncLabel}</span>{lastSync&&<span style={{color:"#94A3B8",fontSize:11}}>• {lastSync.toLocaleTimeString("en-IN")}</span>}</div><div style={{display:"flex",gap:8}}><button onClick={loadFromGH} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#2563EB",fontWeight:600,fontFamily:"inherit"}}>↻ Refresh</button><button onClick={()=>{localStorage.removeItem("gh_token");setAuthed(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#94A3B8",fontFamily:"inherit"}}>Disconnect</button></div></div>

      <div className="header"><div className="header-top"><div className="profile"><div className="avatar">{PROFILE.initials}</div><div><div className="profile-name">{PROFILE.name}</div><div className="profile-role">{PROFILE.role} &bull; Project Command Center</div></div></div><div className="header-right"><div style={{fontWeight:600}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div><div>{projects.length} Project{projects.length!==1?"s":""} &bull; {tasks.length} Task{tasks.length!==1?"s":""}</div><button className="print-btn no-print" onClick={()=>window.print()} style={{marginTop:6}}>🖨 Print</button></div></div>
        <div className="nav-tabs no-print">
          <button className={"nav-tab "+(view==="overview"?"active":"")} onClick={()=>{setView("overview");setFilterStatus("All");}}>📊 Overview</button>
          <button className={"nav-tab "+(view==="journeymap"?"active":"")} onClick={()=>setView("journeymap")}>🗺️ Journey Map</button>
          <button className={"nav-tab "+(view==="ai"?"active":"")} onClick={()=>setView("ai")}>🤖 AI Assistant</button>
          {projects.map(p=>(<button key={p.id} className={"nav-tab "+(activeProjectId===p.id?"active":"")} onClick={()=>{setView("project:"+p.id);setSubTab("tasks");setFilterStatus("All");}} style={activeProjectId!==p.id?{borderBottom:"3px solid "+p.color}:{}}><span className="color-dot" style={{background:p.color}}/>{p.name}</button>))}
        </div>
      </div>

      <div className="container">
        {view==="overview"&&<>
          <div className="stats-row"><div className="stat-card"><div className="stat-label">📁 PROJECTS</div><div className="stat-value" style={{color:"#1E3A5F"}}>{projects.length}</div></div><div className="stat-card"><div className="stat-label">📋 TASKS</div><div className="stat-value" style={{color:"#1E40AF"}}>{tasks.length}</div></div><div className="stat-card"><div className="stat-label">🔄 IN PROGRESS</div><div className="stat-value" style={{color:"#2563EB"}}>{totalInProgress}</div></div><div className="stat-card"><div className="stat-label">✅ COMPLETED</div><div className="stat-value" style={{color:"#059669"}}>{totalCompleted}</div></div><div className="stat-card"><div className="stat-label">⚠️ OVERDUE</div><div className="stat-value" style={{color:"#DC2626"}}>{totalOverdue}</div></div></div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontSize:16,fontWeight:800}}>My Projects</h2><button className="btn btn-primary no-print" onClick={()=>setModal("project")}>+ New Project</button></div>
          {projects.length===0?<div className="card empty"><div style={{fontSize:36,marginBottom:12}}>📁</div><div style={{fontWeight:700,fontSize:15,marginBottom:6}}>No projects yet</div><button className="btn btn-primary" onClick={()=>setModal("project")} style={{marginTop:12}}>+ Create First Project</button></div>:
          <div className="projects-grid">{projects.map(p=>{const pT=projTasks(p.id),done=pT.filter(t=>t.status==="Completed").length,ov=pT.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr()).length,pct=projProgress(p.id);return<div key={p.id} className="card card-hover" onClick={()=>{setView("project:"+p.id);setSubTab("tasks");setFilterStatus("All");}} style={{borderLeft:"4px solid "+p.color}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div style={{flex:1}}><div style={{fontWeight:800,fontSize:15,marginBottom:3}}>{p.name}</div>{p.description&&<div style={{fontSize:12,color:"#64748B",marginBottom:8}}>{p.description}</div>}{p.owner&&<div style={{fontSize:11,color:"#94A3B8"}}>Stakeholder: {p.owner}</div>}</div><div className="ring-container"><Ring pct={pct} color={p.color}/><div className="ring-text" style={{fontSize:12,color:p.color}}>{pct}%</div></div></div><div style={{display:"flex",gap:14,fontSize:12,color:"#64748B",marginTop:10,borderTop:"1px solid #F1F5F9",paddingTop:10,flexWrap:"wrap"}}><span>📋 {pT.length}</span><span>✅ {done}</span>{ov>0&&<span style={{color:"#DC2626",fontWeight:700}}>⚠ {ov}</span>}<span>🎯 {projMilestones(p.id).length}</span></div></div>;})}</div>}
          {totalOverdue>0&&<div className="overdue-box"><div style={{fontWeight:800,color:"#991B1B",fontSize:13,marginBottom:10,textTransform:"uppercase"}}>⚠ Overdue Tasks</div>{tasks.filter(t=>t.status!=="Completed"&&t.deadline&&t.deadline<todayStr()).map(t=>{const proj=projects.find(p=>p.id===t.projectId);return<div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #FECACA",fontSize:13}}><div><b>{t.title}</b> <span style={{color:"#64748B",fontSize:11}}>({proj?.name||"\u2014"})</span></div><span style={{color:"#DC2626",fontWeight:600,fontSize:12}}>{daysBetween(todayStr(),t.deadline)}d overdue</span></div>;})}</div>}
        </>}

        {view==="journeymap"&&<InteractiveMindMap tree={journeyTree} title="🗺️ All Projects — Journey Mind Map" />}

        {view==="ai"&&<AIAssistant projects={projects} tasks={tasks} logs={logs} milestones={milestones}
          onAddProject={addProject}
          onAddTask={t=>setTasks(prev=>[...prev,t])}
          onUpdateTask={t=>setTasks(prev=>prev.map(x=>x.id===t.id?t:x))}
          onAddLog={l=>setLogs(prev=>[l,...prev])}
          onAddMilestone={m=>setMilestones(prev=>[...prev,m])} />}

        {activeProject&&<>
          <div className="card" style={{marginBottom:18,borderLeft:"5px solid "+activeProject.color}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}><div><div style={{display:"flex",alignItems:"center",gap:10}}><button onClick={()=>setView("overview")} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#64748B",padding:0}}>←</button><h2 style={{fontSize:18,fontWeight:800}}>{activeProject.name}</h2></div>{activeProject.description&&<div style={{fontSize:13,color:"#64748B",marginTop:4,marginLeft:28}}>{activeProject.description}</div>}<div style={{fontSize:12,color:"#94A3B8",marginTop:4,marginLeft:28}}>{activeProject.owner&&<>Stakeholder: <b>{activeProject.owner}</b> &bull; </>}{fmtDate(activeProject.startDate)} → {fmtDate(activeProject.targetEnd)}</div></div><div style={{display:"flex",alignItems:"center",gap:14}} className="no-print"><div className="ring-container"><Ring pct={projProgress(activeProjectId)} size={64} stroke={6} color={activeProject.color}/><div className="ring-text" style={{fontSize:14,color:activeProject.color}}>{projProgress(activeProjectId)}%</div></div><div style={{display:"flex",flexDirection:"column",gap:4}}><button className="btn btn-secondary btn-sm" onClick={()=>{setEditItem(activeProject);setModal("project");}}>Edit</button><button className="btn btn-danger btn-sm" onClick={()=>deleteProject(activeProjectId)}>Delete</button></div></div></div><div style={{display:"flex",gap:16,marginTop:14,paddingTop:14,borderTop:"1px solid #F1F5F9",fontSize:13,color:"#475569",flexWrap:"wrap"}}><span>📋 <b>{projTasks(activeProjectId).length}</b> Tasks</span><span>✅ <b>{projTasks(activeProjectId).filter(t=>t.status==="Completed").length}</b> Done</span><span>🔄 <b>{projTasks(activeProjectId).filter(t=>t.status==="In Progress").length}</b> In Progress</span><span>📝 <b>{projLogs(activeProjectId).length}</b> Logs</span><span>🎯 <b>{projMilestones(activeProjectId).length}</b> Milestones</span></div></div>
          <div className="sub-tabs no-print">{["tasks","daily log","milestones","mindmap"].map(t=>(<button key={t} className={"sub-tab "+(subTab===t?"active":"")} onClick={()=>{setSubTab(t);setFilterStatus("All");}}>{t==="tasks"?"📋 ":t==="daily log"?"📝 ":t==="milestones"?"🎯 ":"🗺️ "}{t}</button>))}</div>

          {subTab==="mindmap"&&projectTree&&<InteractiveMindMap tree={projectTree} title={"🗺️ "+activeProject.name+" — Project Mind Map"} />}

          {subTab==="tasks"&&<><div className="filter-bar no-print"><button className="btn btn-primary" onClick={()=>{setEditItem(null);setModal("task");}}>+ New Task</button><select className="field-input" style={{maxWidth:150}} value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option>All</option><option>Not Started</option><option>In Progress</option><option>On Hold</option><option>Completed</option><option>Overdue</option></select><span style={{fontSize:12,color:"#64748B",marginLeft:"auto"}}>{filteredTasks.length} task{filteredTasks.length!==1?"s":""}</span></div>{filteredTasks.length===0?<div className="card empty" style={{padding:36}}>No tasks match.</div>:filteredTasks.map(t=>{const isOv=t.status!=="Completed"&&t.deadline&&t.deadline<todayStr();return<div key={t.id} className={"task-card "+(isOv?"overdue":"")}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,flexWrap:"wrap"}}><div style={{flex:1,minWidth:180}}><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{t.title}</div>{t.description&&<div style={{fontSize:12,color:"#64748B",marginBottom:6}}>{t.description}</div>}<div style={{display:"flex",flexWrap:"wrap",gap:5,alignItems:"center"}}><Badge label={t.priority} colors={PRIORITY[t.priority]}/><Badge label={isOv?"Overdue":t.status} colors={STATUS[isOv?"Overdue":t.status]}/><span style={{fontSize:11,color:"#94A3B8"}}>via {t.source}</span></div></div><div style={{textAlign:"right",fontSize:12,color:"#64748B"}}>{t.deadline&&<div>Due: <b style={{color:isOv?"#DC2626":"#0F172A"}}>{fmtDate(t.deadline)}</b></div>}{t.assignedBy&&<div>By: {t.assignedBy}</div>}<div style={{display:"flex",gap:6,marginTop:8,justifyContent:"flex-end"}} className="no-print"><button className="btn-edit" onClick={()=>{setEditItem(t);setModal("task");}}>Edit</button><button className="btn-del" onClick={()=>deleteTask(t.id)}>Delete</button></div></div></div>{t.remarks&&<div style={{marginTop:8,padding:"7px 12px",background:"#F8FAFC",borderRadius:8,fontSize:12,color:"#64748B"}}>💬 {t.remarks}</div>}</div>;})}</>}

          {subTab==="daily log"&&<><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}} className="no-print"><button className="btn btn-primary" onClick={()=>setModal("log")}>+ Add Entry</button></div><WhizibleExport logs={logs} projects={projects} /><TimeDistribution logs={projLogs(activeProjectId)} />{projLogs(activeProjectId).length===0?<div className="card empty" style={{padding:36}}>No activity logged yet.</div>:projLogs(activeProjectId).map(l=>(<div key={l.id} className="log-entry"><div className="log-date">{fmtDate(l.date)}</div><div style={{flex:1}}><div style={{fontWeight:600,fontSize:13}}>{l.activity}</div><div style={{display:"flex",gap:14,fontSize:12,color:"#64748B",marginTop:3}}>{l.duration&&<span>⏱ {l.duration}</span>}{l.category&&<span style={{background:"#F1F5F9",padding:"1px 8px",borderRadius:5,fontSize:10,fontWeight:600}}>{l.category}</span>}{l.taskCode&&<span style={{background:"#FFF7ED",color:"#C2410C",padding:"1px 8px",borderRadius:5,fontSize:10,fontWeight:600}}>{l.taskCode}</span>}{l.outcome&&<span>✓ {l.outcome}</span>}</div></div><button className="btn-del no-print" onClick={()=>deleteLog(l.id)}>Delete</button></div>))}</>}

          {subTab==="milestones"&&<><div style={{marginBottom:14}} className="no-print"><button className="btn btn-primary" onClick={()=>setModal("milestone")}>+ Add Milestone</button></div>{projMilestones(activeProjectId).length===0?<div className="card empty" style={{padding:36}}>No milestones yet.</div>:projMilestones(activeProjectId).map(m=>(<div key={m.id} className="milestone-card"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div><div style={{fontWeight:700,fontSize:14}}>{m.title}</div>{m.targetDate&&<div style={{fontSize:12,color:"#64748B"}}>Target: {fmtDate(m.targetDate)}</div>}</div><div style={{display:"flex",gap:6,alignItems:"center"}}><Badge label={m.status} colors={STATUS[m.status]}/><button className="btn-del no-print" onClick={()=>deleteMilestone(m.id)}>Delete</button></div></div><div className="progress-bar"><div className="progress-fill" style={{width:m.progress+"%",background:m.progress===100?"#059669":m.progress>=50?"#2563EB":"#F59E0B"}}/></div><div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>{m.progress}%</div>{m.notes&&<div style={{marginTop:8,padding:"7px 12px",background:"#F8FAFC",borderRadius:8,fontSize:12,color:"#64748B"}}>{m.notes}</div>}</div>))}</>}
        </>}
      </div>

      {modal==="project"&&<Modal title={editItem?"Edit Project":"New Project"} onClose={()=>{setModal(null);setEditItem(null);}}><ProjectForm existing={editItem} onSave={editItem?updateProject:addProject} onCancel={()=>{setModal(null);setEditItem(null);}}/></Modal>}
      {modal==="task"&&<Modal title={editItem?"Edit Task":"New Task"} onClose={()=>{setModal(null);setEditItem(null);}}><TaskForm task={editItem} projects={projects} defaultProject={activeProjectId} onSave={editItem?updateTask:addTask} onCancel={()=>{setModal(null);setEditItem(null);}}/></Modal>}
      {modal==="log"&&<Modal title="New Activity Log" onClose={()=>setModal(null)}><LogForm projects={projects} defaultProject={activeProjectId} onSave={addLog} onCancel={()=>setModal(null)}/></Modal>}
      {modal==="milestone"&&<Modal title="New Milestone" onClose={()=>setModal(null)}><MilestoneForm projects={projects} defaultProject={activeProjectId} onSave={addMilestone} onCancel={()=>setModal(null)}/></Modal>}
      <div className="footer">{PROFILE.name} &bull; {PROFILE.role} &bull; Project Command Center &bull; Cloud-synced to GitHub</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
